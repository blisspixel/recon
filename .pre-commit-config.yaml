repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: pyright
        language: system
        types: [python]
        pass_filenames: false
        # Match CI exactly (.github/workflows/ci.yml: pyright recon_tool/ tests/).
        # A narrower scope here let test-file type errors reach CI red.
        args: [recon_tool/, tests/]

      - id: metadata-coverage
        name: metadata-coverage (descriptions on every fingerprint detection)
        entry: python scripts/check_metadata_coverage.py
        language: system
        pass_filenames: false
        files: ^recon_tool/data/fingerprints/.*\.yaml$

  # Static lint for GitHub Actions workflow YAML. Catches:
  #   - unresolved action refs (the ``setup-uv@v8`` non-tag that broke
  #     the first v1.0.2 release),
  #   - shell-syntax errors in ``run:`` blocks,
  #   - expression-syntax errors (``${{ ... }}``),
  #   - deprecated ``::set-output::`` and friends.
  # Runs against every ``.yml`` / ``.yaml`` file under ``.github/workflows/``.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
