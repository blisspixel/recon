[cosmic-ray]
module-path = "recon_tool/formatter.py"
timeout = 60
excluded-modules = []
test-command = "python -m pytest tests/test_formatter_ceiling.py tests/test_formatter_ceiling_boundary.py tests/test_multi_cloud_rollup.py tests/test_count_cloud_vendors_properties.py tests/test_panel_render_snapshots.py tests/test_panel_output_sanity.py tests/test_cloud_vendor_coverage.py tests/test_mutation_resistance.py -x -q --no-header"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.git]
exclude-paths = []

# Targeted line range: the v1.9.9 helpers and the ceiling-trigger
# block. Mutating the entire 3000-line formatter.py would take hours
# and most mutations would land on rendering code unrelated to the
# v1.9.9 changes. The line range below covers:
#   - _CLOUD_VENDOR_BY_SLUG and _CLOUD_VENDOR_ROLLUP_EXCLUSIONS
#   - canonical_cloud_vendor, count_cloud_vendors, category_for_slug
#   - the ceiling-trigger block and Multi-cloud rendering inside
#     render_tenant_panel
# These are the surfaces the v1.9.9 test files claim to pin.
