# Splunk sourcetype definition for recon --ndjson output.
#
# Drop this file into $SPLUNK_HOME/etc/system/local/props.conf (merge
# stanzas if you already have one), or under apps/<your-app>/local/
# if you scope sourcetypes to an app.
#
# After installation, configure an inputs.conf monitor on the path
# where you write recon batch output:
#
#   [monitor:///var/log/recon/*.ndjson]
#   sourcetype = recon:lookup
#   index      = recon
#
# recon's --ndjson emits one JSON document per line, which is what
# Splunk's INDEXED_EXTRACTIONS=json ingests natively. No custom
# Python or modular input is required.

[recon:lookup]

# One event per line; recon --ndjson never wraps a single lookup
# across multiple lines.
SHOULD_LINEMERGE = false
LINE_BREAKER     = ([\r\n]+)

# Use the JSON ingestion path. Splunk auto-extracts every top-level
# field of the recon JSON object into a Splunk event field of the
# same name.
INDEXED_EXTRACTIONS = json
KV_MODE            = none

# recon's --json output does not embed a timestamp inside the
# payload by default. Tag the indexer's receipt time as the event
# time. Operators who want the lookup time should add
# --emit-timestamp to the recon invocation (post-v2.0 surface; for
# now, the indexer time is a reasonable proxy).
DATETIME_CONFIG = CURRENT

# recon JSON outputs are small (10-50 KB typical), but a batch lookup
# of a large tenant with many evidence entries can approach 200 KB.
# Bump the truncate to keep evidence intact.
TRUNCATE = 524288

# Disable Splunk's auto field discovery for the multi-valued arrays
# under recon's evidence and conflict_provenance — INDEXED_EXTRACTIONS
# already handles them natively, and AUTO_KV would double-extract.
AUTO_KV_JSON = true
