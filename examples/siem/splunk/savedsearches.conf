# Example Splunk saved searches for recon-lookup data.
#
# Drop into $SPLUNK_HOME/etc/system/local/savedsearches.conf or
# apps/<your-app>/local/savedsearches.conf. Each stanza is independent;
# install only the searches you want.
#
# The lookup file recon_slug_baseline.csv referenced by the shadow-IT
# search is expected to live under your app's lookups/ directory and
# carry two columns: queried_domain, slugs. Populate it from a periodic
# `| outputlookup` of trusted-state recon results.

[recon - shadow IT alert]
# v1.9.4: literal set-membership via in() inside mvfilter(). Closes
# audit finding "Splunk SIEM example uses unescaped regex slugs"
# (informational, v1.9.3.8). The earlier SPL used
# match(current_slugs, mvjoin(baseline_slugs, "|")) which treated
# every baseline slug as a regex alternative — a baseline slug
# containing metacharacters such as ``.*`` would match any
# current_slug and silently suppress the alert. The new SPL uses
# in(x, mv_field) which compares LITERAL values; no regex
# interpretation of slug strings anywhere in the search.
search = index=recon sourcetype=recon:lookup\
| stats values(slugs) as current_slugs by queried_domain\
| lookup recon_slug_baseline.csv queried_domain OUTPUT slugs AS baseline_slugs\
| eval new_slugs=mvfilter(NOT in(current_slugs, baseline_slugs))\
| where mvcount(new_slugs) > 0\
| table queried_domain new_slugs
dispatch.earliest_time = -24h@h
dispatch.latest_time   = now
cron_schedule          = 0 8 * * *
action.email           = 0
description            = New SaaS slugs observed on a monitored tenant since the last baseline outputlookup. Uses literal set-membership (in() inside mvfilter()) so slug values are compared literally — never as regex.

[recon - DMARC drift]
search = index=recon sourcetype=recon:lookup\
| sort _time\
| streamstats current=f last(dmarc_policy) as prev_policy by queried_domain\
| where (prev_policy="reject" AND dmarc_policy!="reject") OR (prev_policy="quarantine" AND dmarc_policy="none")\
| table _time queried_domain prev_policy dmarc_policy
dispatch.earliest_time = -7d@d
dispatch.latest_time   = now
cron_schedule          = 0 9 * * *
description            = DMARC policy weakened on a monitored tenant since the prior lookup (reject -> quarantine, or quarantine -> none).

[recon - federation discovery]
search = index=recon sourcetype=recon:lookup\
| streamstats current=f last(auth_type) as prev_auth_type by queried_domain\
| where prev_auth_type!=auth_type\
| table _time queried_domain prev_auth_type auth_type
dispatch.earliest_time = -30d@d
dispatch.latest_time   = now
cron_schedule          = 30 9 * * *
description            = Tenant auth_type changed (Managed <-> Federated) since the prior lookup.
