# signals.yaml — derived intelligence from fingerprint matches
# Version: 2026-04-11
# These fire automatically after fingerprint detection.
# No extra DNS calls — pure pattern matching on detected slugs.
#
# Design inspired by multi-vector fusion: signals are layered from simple
# (single-category detection) to composite (cross-category correlation)
# to consistency checks (contradiction detection across layers).

signals:

  # ── Layer 1: Single-category detection ────────────────────────────────
  # These fire when enough tools from one category are present.

  - name: AI Adoption
    category: AI
    confidence: high
    description: Public indicators associated with an AI platform; registration or verification does not establish active use
    requires:
      any: [openai, anthropic, mistral, perplexity, crewai-aid, langsmith, mcp-discovery]
    min_matches: 1

  - name: High GTM Maturity
    category: Go-to-Market
    confidence: high
    description: Multiple public sales or marketing platform indicators
    requires:
      any: [6sense, outreach, salesloft, pardot, eloqua, klaviyo, hubspot, marketo, demandbase, clearbit, drift, gong, intercom, apollo, salesforce-mc, braze, iterable, customerio, unbounce]
    min_matches: 2

  - name: Enterprise Security Stack
    category: Security
    confidence: high
    description: Multiple public security-vendor indicators; active deployment and investment are not established
    requires:
      any: [crowdstrike, knowbe4, proofpoint, mimecast, zscaler, paloalto, wiz, sophos, trellix, barracuda, trendmicro, okta, auth0, duo, 1password, sentinelone, netskope, ping-identity, cyberark, cato, onelogin, imperva, beyond-identity]
    min_matches: 2

  - name: Modern Collaboration
    category: Productivity
    confidence: high
    description: Multiple public collaboration-platform indicators
    requires:
      any: [slack, notion, miro, atlassian, figma, dropbox, clickup, asana, monday, loom, canva, zoom, airtable]
    min_matches: 3

  - name: Dev & Engineering Heavy
    category: Engineering
    confidence: medium
    description: Multiple public developer-platform indicators; staffing level is not inferred
    requires:
      any: [github, gitlab, vercel, netlify, postman, linear, figma, autodesk, databricks, snowflake, mongodb, webflow, launchdarkly, contentful, sanity, flyio, railway, fastly]
    min_matches: 2

  - name: Data & Analytics Investment
    category: Data
    confidence: medium
    description: Multiple public analytics or data-platform indicators
    requires:
      any: [databricks, snowflake, mongodb, dynatrace, mixpanel, amplitude, heap, pendo, hotjar, segment, optimizely, walkme]
    min_matches: 2

  - name: Multi-Cloud
    category: Infrastructure
    confidence: high
    description: Multiple public cloud-infrastructure indicators; provider diversity is not established by slug count alone
    requires:
      any: [aws-route53, aws-cloudfront, aws-elb, aws-s3, aws-eb, azure-dns, azure-cdn, azure-appservice, azure-fd, azure-tm, gcp-dns, gcp-app, flyio]
    min_matches: 2

  - name: Edge Layering
    category: Infrastructure
    confidence: high
    description: Multiple public edge-provider indicators; layering and delivery strategy are not established
    requires:
      any: [cloudflare, akamai, fastly, imperva]
    min_matches: 2
  - name: Observability & SRE
    category: Engineering
    confidence: high
    description: Multiple public observability-vendor indicators
    requires:
      any: [datadog, newrelic, pagerduty, dynatrace]
    min_matches: 2

  # ── Layer 2: Cross-category composite signals ─────────────────────────
  # These correlate detections across different categories to surface
  # higher-level organizational patterns. Inspired by the research's
  # "multi-vector fusion" concept — combining independent signal layers
  # produces insights that no single layer can provide alone.

  - name: Digital Transformation
    category: Composite
    confidence: medium
    description: AI, collaboration, and cloud-platform indicators co-observed
    requires:
      any: [openai, anthropic, slack, notion, miro, figma, atlassian, vercel, netlify, databricks, snowflake]
    min_matches: 4

  - name: Sales-Led Growth
    category: Composite
    confidence: medium
    description: CRM, sales-engagement, and marketing-platform indicators co-observed
    requires:
      any: [salesforce, salesforce-mc, hubspot, outreach, salesloft, 6sense, pardot, eloqua, marketo, gong, apollo, drift, clearbit, demandbase, intercom, braze, iterable]
    min_matches: 3

  - name: Product-Led Growth
    category: Composite
    confidence: medium
    description: Analytics, engagement, and support-platform indicators co-observed
    requires:
      any: [mixpanel, amplitude, heap, pendo, hotjar, segment, intercom, zendesk, freshdesk, optimizely, walkme, customerio, braze]
    min_matches: 3

  - name: Multi-Layer Security Tooling
    category: Composite
    confidence: high
    description: Four or more security-vendor slugs observed across catalog categories
    requires:
      any: [okta, auth0, onelogin, duo, ping-identity, crowdstrike, sophos, sentinelone, jamf, kandji, proofpoint, mimecast, zscaler, netskope, paloalto, cato, wiz, 1password, cyberark, knowbe4, imperva]
    min_matches: 4

  # AI Security Posture retired in v1.0.2 — the slug list mixed AI
  # platforms (openai/anthropic/mistral/perplexity) with security tools
  # (lakera/zscaler/netskope/crowdstrike) with min_matches: 3, which
  # meant the signal named "AI Security Posture" could fire on three
  # AI platforms alone, with zero security tooling observed. That's a
  # false claim. Use AI Platform Diversity + Multi-Layer Security
  # Tooling together for the equivalent composition.

  # ── Layer 3: Cross-signal consistency checks ──────────────────────────
  # Inspired by the research's core thesis: "penalize contradictions
  # between layers." These detect when signals from different domains
  # are inconsistent, which often reveals interesting organizational
  # dynamics (not necessarily problems — sometimes transitions).

  - name: Security Gap — Gateway Without DMARC Enforcement
    category: Consistency
    confidence: medium
    description: Email-security vendor indicator observed while effective DMARC policy is not enforcing; routing role is not inferred
    requires:
      any: [proofpoint, mimecast, barracuda, trendmicro, cisco-ironport, cisco-email, symantec, trellix]
    min_matches: 1
    metadata:
      - field: dmarc_effective_policy
        operator: neq
        value: reject
      - field: dmarc_effective_policy
        operator: neq
        value: quarantine

  - name: Heavy Outbound Stack
    category: Composite
    confidence: medium
    description: Multiple public email-sender vendor indicators
    requires:
      any: [sendgrid, mailgun, postmark, sparkpost, brevo, mailchimp, aws-ses]
    min_matches: 2

  - name: File Collaboration Sprawl
    category: Consistency
    confidence: medium
    description: Multiple public file-sharing platform indicators
    requires:
      any: [dropbox, box, egnyte]
    min_matches: 2

  - name: Zero Trust Pattern Observed
    category: Composite
    confidence: high
    description: Three or more identity, network-security, or endpoint-vendor indicators observed; architecture is not inferred
    requires:
      any: [okta, auth0, onelogin, duo, ping-identity, zscaler, netskope, paloalto, cato, crowdstrike, sentinelone, 1password, cyberark, imperva]
    min_matches: 3

  - name: Startup Tool Mix
    category: Composite
    confidence: medium
    description: Developer, collaboration, and analytics-platform indicators co-observed; company stage is not inferred
    requires:
      any: [vercel, netlify, github, gitlab, slack, notion, figma, linear, amplitude, mixpanel, segment, intercom]
    min_matches: 4

  - name: Dual Email Provider
    category: Consistency
    confidence: high
    description: Microsoft 365 and Google Workspace indicators co-observed; delivery topology and cause remain unknown
    requires:
      any: [microsoft365, google-workspace]
    min_matches: 2

  - name: Google-Native Identity
    category: Composite
    confidence: high
    description: Multiple Google service and identity indicators co-observed
    requires:
      any: [google-workspace, google-site, gcp-dns, google-trust, google-federated, google-managed]
    min_matches: 3

  - name: High-Security Posture (CSE)
    category: Security
    confidence: high
    description: Google Workspace Client-Side Encryption indicator observed
    requires:
      any: [google-cse]
    min_matches: 1

  - name: Google Cloud Investment
    category: Infrastructure
    confidence: medium
    description: Multiple Google cloud-service indicators observed
    requires:
      any: [gcp-dns, google-trust, google-workspace, google-cse]
    min_matches: 2

  - name: Google Workspace Full Suite
    category: Composite
    confidence: high
    description: Google Workspace module and provider indicators co-observed; full-suite use is not established
    requires:
      any: [google-workspace-modules, google-workspace]
    min_matches: 2

  - name: Google Federated Identity
    category: Identity
    confidence: high
    description: Google Workspace with external identity provider — enterprise SSO
    requires:
      any: [google-federated]
    min_matches: 1

  - name: Google MTA-STS Enforcing
    category: Security
    confidence: high
    description: MTA-STS policy set to enforce — mandatory email transport encryption
    requires:
      any: [mta-sts-enforce]
    min_matches: 1

  # ── Layer 4: Metadata-aware signals ───────────────────────────────────
  # These combine slug detection with metadata conditions (DMARC policy,
  # SPF complexity, email security score, certificate issuance velocity)
  # for richer cross-reference intelligence.

  - name: Federated Identity with Complex Email Delegation
    category: Consistency
    confidence: medium
    description: Identity-vendor indicator observed alongside high SPF include complexity; authentication and mail delegation are not linked by this evidence
    requires:
      any: [okta, auth0, onelogin, duo, ping-identity]
    min_matches: 1
    metadata:
      - field: spf_include_count
        operator: gte
        value: 5

  - name: Active Email Sending with Minimal Security
    category: Consistency
    confidence: high
    description: Email-sender vendor indicator observed with a public email-control evidence score at or below 1
    requires:
      any: [sendgrid, mailgun, postmark, sparkpost, brevo, mailchimp, aws-ses]
    min_matches: 1
    metadata:
      - field: email_security_score
        operator: lte
        value: 1

  - name: High Certificate Issuance Activity
    category: Infrastructure
    confidence: medium
    description: At least 20 certificate issuances observed in the last 90 days; cause is not inferred
    metadata:
      - field: issuance_velocity
        operator: gte
        value: 20

  # ── Layer 4 (continued): Contradiction signals ───────────────────────
  # These use the `contradicts` key to detect split-brain configurations,
  # incomplete migrations, and governance gaps. A contradiction slug's
  # presence suppresses the signal — indicating the inconsistency has
  # been resolved.

  - name: Incomplete Identity Migration
    category: Consistency
    confidence: medium
    description: Legacy non-reportable rule based on an identity-vendor slug and non-observation of Microsoft 365
    explain: "This legacy rule is retained for identifier compatibility but is not emitted publicly. An identity-vendor slug and non-observation of Microsoft 365 do not establish migration state."
    requires:
      any: [okta, auth0, ping-identity]
    min_matches: 1
    contradicts: [microsoft365]

  - name: Dual Email Delivery Path
    category: Consistency
    confidence: medium
    description: Microsoft 365 and Google Workspace indicators co-observed; delivery topology and cause remain unknown
    explain: "Microsoft 365 and Google Workspace indicators can reflect active use, verification-only registration, copied configuration, or historical residue. The rule does not determine delivery topology or cause."
    requires:
      any: [microsoft365, google-workspace]
    min_matches: 2
    contradicts: [mta-sts-enforce]

  # ── v0.8.0: Agentic AI & supply chain signals ────────────────────────

  - name: Agentic AI Infrastructure
    category: AI & Automation
    confidence: medium
    description: Multiple AI or automation-platform indicators observed; autonomous-agent deployment is not established
    explain: "This rule reports multiple AI or automation-platform indicators. Public registration and discovery records do not establish that an autonomous agent is deployed or active."
    requires:
      any: [crewai-aid, langsmith, mcp-discovery, openai, anthropic, mistral, perplexity, dify, n8n, autogen]
    min_matches: 2

  - name: AI Platform Diversity
    category: AI
    confidence: medium
    description: Multiple AI/LLM platform indicators observed; strategy and active use are not established
    explain: "Indicators for two or more AI/LLM providers are present. The evidence does not distinguish active use, evaluation, independent teams, verification-only registration, or historical residue."
    requires:
      any: [openai, anthropic, mistral, perplexity]
    min_matches: 2

  - name: Software Supply Chain Maturity
    category: DevOps & Engineering
    confidence: medium
    description: Multiple software-supply-chain vendor indicators observed; process maturity is not inferred
    explain: "Two or more software-supply-chain vendor indicators are observed. These public records do not establish deployment scope, process maturity, or investment."
    requires:
      any: [github-advanced-security, sonatype, snyk, cosign-attestation, github]
    min_matches: 2

  - name: Edge-Native Architecture
    category: Infrastructure
    confidence: medium
    description: Multiple edge or serverless platform indicators observed; deployment architecture is not inferred
    explain: "Two or more edge or serverless platform indicators are observed. The records do not establish a domain-wide deployment architecture."
    requires:
      any: [vercel, netlify, flyio, railway, cloudflare, fastly, render]
    min_matches: 2

  - name: Enterprise Email Deliverability
    category: Email
    confidence: high
    description: SPF-flattening or DMARC-management vendor indicator observed; team structure is not inferred
    explain: "An SPF-flattening or DMARC-management vendor indicator is observed. It does not establish why the record exists, whether the service is current, or how email operations are staffed."
    requires:
      any: [autospf, ondmarc, dmarcian, easydmarc, valimail]
    min_matches: 1

  - name: DMARC Governance Investment
    category: Email
    confidence: high
    description: DMARC-reporting vendor indicator observed; commercial status and governance investment are not inferred
    explain: "A DMARC aggregate-report address associated with a catalogued vendor is observed. The record does not establish contract status, current use, governance investment, or maturity."
    requires:
      any: [agari, proofpoint-efd, ondmarc, dmarcian, valimail, easydmarc, uriports, dmarc-advisor, powerdmarc, mimecast-dmarc-analyzer]
    min_matches: 1

  # ── v0.9.0: Primary Email Provider Detection signals ──────────────────

  - name: Email Gateway Topology
    category: Email
    confidence: high
    description: Email-security vendor and primary email-provider indicators co-observed; the vendor's routing role is not established here
    explain: "An email-security vendor slug and a primary email-provider field are co-observed. Because this rule does not retain the slug's evidence role, it does not itself establish that the vendor handles MX routing or sits in front of the provider."
    requires:
      any: [proofpoint, mimecast, barracuda, cisco-ironport, cisco-email, symantec, trellix, trendmicro]
    min_matches: 1
    metadata:
      - field: primary_email_provider
        operator: neq
        value: ""

  - name: Secondary Email Provider Observed
    category: Consistency
    confidence: medium
    description: A second email-service indicator is observed alongside a different MX-based primary; active use, historical residue, and verification-only registration remain compatible
    explain: "A provider indicator differs from the MX-based primary. Active use, verification-only registration, copied configuration, and historical residue remain compatible because the current signal context does not retain the indicator's evidence role."
    requires:
      any: [microsoft365, google-workspace]
    min_matches: 1
    metadata:
      - field: primary_email_provider
        operator: neq
        value: ""
    exclude_matches_in_primary: true
