# Fintech profile — lens for payments, banking, and regulated
# financial services organisations. Reweights observations to
# prioritise identity, email authentication, and supply-chain
# signals — the controls auditors scrutinise first.
name: fintech
description: Fintech / payments / regulated financial services lens
category_boost:
  email: 1.6
  identity: 1.5
  consistency: 1.3
  certificate: 1.2
  infrastructure: 0.9
  saas_footprint: 0.8
# signal_boost / exclude_signals keys are posture observation rule
# names (the `name` field in data/posture.yaml), matched against the
# rule that produced each observation.
signal_boost:
  strong_email_security: 2.0
  gateway_without_dmarc_enforcement: 1.8
  weak_email_security: 1.8
  security_tooling_detected: 1.5
  supply_chain_security_detected: 1.4
exclude_signals:
  - file_sharing_sprawl
  - consumer_saas_sprawl
prepend_note: |
  Fintech profile applied. Email authentication, identity federation,
  and supply-chain controls are weighted higher than infrastructure
  footprint. Use --explain to see why each signal fired.
# v1.8: vertical-baseline anomaly rules. Each entry is a fingerprint
# CATEGORY (matched against the slug's category, not the slug name) or
# a chain-motif name. Absence becomes a hedged "absence is observable"
# observation — never a verdict. Drop or extend in
# ~/.recon/profiles/fintech.yaml as appropriate to your environment.
expected_categories:
  - Identity & Auth
  - Security
expected_motifs:
  - cloudflare_to_aws
