# High-value-target profile — lens for organisations likely to be
# targeted by sophisticated adversaries (F100, critical
# infrastructure, government contractors, journalists, defence
# supply chain). Prioritises edge hardening, identity rigor,
# layered email security, and any hedged "hardening observed"
# signal that surfaces when the positive_when_absent engine fires.
name: high-value-target
description: Organisations with elevated targeting risk — prioritises hardening indicators
category_boost:
  identity: 1.6
  email: 1.5
  infrastructure: 1.5
  consistency: 1.4
  certificate: 1.3
  saas_footprint: 0.7
# signal_boost / exclude_signals keys are posture observation rule
# names (the `name` field in data/posture.yaml).
signal_boost:
  edge_layering: 2.0
  edge_compute_detected: 1.6
  security_tooling_detected: 1.8
  gateway_without_dmarc_enforcement: 1.8
  strong_email_security: 1.6
  supply_chain_security_detected: 1.5
exclude_signals:
  - consumer_saas_sprawl
prepend_note: |
  High-value-target profile applied. Edge hardening, identity
  rigor, layered email security, and hardening-pattern
  observations are prioritised. Sparse-data targets are expected —
  the absence of consumer SaaS is itself a signal at this level.
# v1.8 vertical-baseline anomaly rules. High-value targets often expose
# identity and security-control evidence in the passive channel. Absence
# is surfaced as an observable ceiling note, not a verdict.
expected_categories:
  - Identity
  - Security & Compliance
