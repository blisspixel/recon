# Healthcare profile — lens for HIPAA-adjacent, hospital system,
# and health-tech organisations. Prioritises identity, data
# residency (infrastructure sovereignty), email authentication,
# and any signal that touches PHI boundary hygiene.
name: healthcare
description: Healthcare / HIPAA-adjacent / health-tech lens
category_boost:
  email: 1.5
  identity: 1.5
  infrastructure: 1.3
  consistency: 1.4
  saas_footprint: 0.9
# signal_boost / exclude_signals keys are posture observation rule
# names (the `name` field in data/posture.yaml).
signal_boost:
  strong_email_security: 1.8
  gateway_without_dmarc_enforcement: 1.9
  weak_email_security: 1.9
  security_tooling_detected: 1.5
exclude_signals:
  - consumer_saas_sprawl
prepend_note: |
  Healthcare profile applied. Email authentication, identity
  federation, infrastructure sovereignty, and PHI-boundary
  consistency are prioritised. Use --explain to see the evidence
  behind each signal.
# v1.8: vertical-baseline anomaly rules. Drop or extend in
# ~/.recon/profiles/healthcare.yaml as appropriate to your
# environment.
expected_categories:
  - Identity & Auth
  - Security
