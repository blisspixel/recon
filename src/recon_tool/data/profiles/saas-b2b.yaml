# SaaS B2B profile — lens for cloud-native B2B software companies.
# Weights DevOps maturity, observability, identity federation,
# and go-to-market tooling higher. Expects modern collaboration
# stack and product-led growth signals as baseline.
name: saas-b2b
description: SaaS / B2B cloud-native software company lens
category_boost:
  identity: 1.4
  saas_footprint: 1.3
  infrastructure: 1.2
  email: 1.2
# signal_boost keys are posture observation rule names (the `name`
# field in data/posture.yaml).
signal_boost:
  supply_chain_security_detected: 1.5
  edge_compute_detected: 1.3
  broad_saas_adoption: 1.3
  ai_tooling_detected: 1.3
prepend_note: |
  SaaS / B2B profile applied. DevOps maturity, observability,
  identity federation, and go-to-market signals are prioritised
  for cloud-native software companies.
