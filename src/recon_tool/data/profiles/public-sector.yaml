# Public sector profile — lens for government, education, and
# public-sector organisations. Prioritises sovereignty indicators
# (cloud_instance, tenant_region_sub_scope), email authentication,
# and identity federation. De-prioritises go-to-market signals
# that rarely apply to government work.
name: public-sector
description: Government / education / public sector lens
category_boost:
  email: 1.5
  identity: 1.5
  infrastructure: 1.4
  consistency: 1.3
  saas_footprint: 0.8
# signal_boost / exclude_signals keys are posture observation rule
# names (the `name` field in data/posture.yaml).
signal_boost:
  strong_email_security: 1.8
  gateway_without_dmarc_enforcement: 1.9
  security_tooling_detected: 1.5
  federated_identity: 1.5
exclude_signals:
  - consumer_saas_sprawl
prepend_note: |
  Public-sector profile applied. Sovereignty (cloud instance,
  region sub-scope), email authentication, and identity federation
  are prioritised. Go-to-market signals are de-prioritised.
