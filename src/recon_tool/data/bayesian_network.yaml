# Bayesian network — v1.9 (stable v2.0+)
#
# Schema version: 1
# Network topology version: v1.9.3 (frozen 2026-05-09)
#
# Discrete Bayesian network over high-level claims about a domain's
# public-facing posture. Nodes are binary unless otherwise noted.
# Evidence binds to nodes via observable slugs and signals already
# emitted by the deterministic pipeline. The network is committed
# as a YAML data file. There is no runtime training or bundled estimator.
# Parameters are manually encoded, and selected values were informed by the
# dated development-corpus measurements documented below.
#
# Topology stability contract: the SET of nodes and the parent
# relationships in this file are stable across v1.9.x releases
# *except* at bridge milestones that explicitly authorize topology
# change (v1.9.3 split of email_security_strong, v1.9.5 dispositions).
# Likelihood numbers and CPT entries may be tuned in v1.9.x based on
# corpus calibration findings; arbitrary node additions / removals
# remain v1.10+ (require schema version bump).
#
# Topology change history:
#   v1.9.0 — initial seed network (8 nodes).
#   v1.9.3 — split email_security_strong into
#            email_security_modern_provider (provider presence,
#            CPT-driven, no evidence) and
#            email_security_policy_enforcing (root, evidence-driven
#            on DMARC/DKIM/SPF/MTA-STS). Expanded federated_identity
#            parents to include google_workspace_tenant. Resolves the
#            52.6% v1.9.0 corpus disagreement on email_security_strong
#            (definitional gap; see validation/v1.9.3-calibration.md).
#            Net: 9 nodes.
#
# Validation: see validation/v1.9-validation-summary.md for
# numerical correctness, sensitivity bound, synthetic calibration
# ECE, and per-node calibration weak spots driving the v1.9.x
# tuning roadmap.
#
# Schema
# ------
#
# version (required, int): schema version. 1 for v1.9.
#
# nodes (required, list): every node in the network.
#   name (required, str): stable identifier (slug-shaped).
#   description (required, str): one-line claim, plain English.
#     Used in --explain-dag rendering.
#   prior (optional, float in [0, 1]): P(present). Required for nodes
#     without parents. When parents are listed, ``cpt`` is required
#     instead.
#   parents (optional, list of node names): all listed parents must
#     be defined elsewhere in this file. The full network must be a
#     DAG; the loader rejects cycles.
#   cpt (optional, dict): conditional probability table when parents
#     are listed. Keys are ``parent1=state1,parent2=state2`` strings;
#     values are P(this_node=present | that parent assignment) in
#     [0, 1]. Every parent assignment must appear (loader checks).
#     Parent states are ``present`` / ``absent`` for binary parents.
#   evidence (optional, list): observable bindings.
#     slug (optional, str): fingerprint slug to watch for.
#     signal (optional, str): signal name to watch for.
#     likelihood (required, [float, float]):
#       [P(observed | node=present), P(observed | node=absent)].
#       Both in (0, 1). The "observed" side is what enters as
#       evidence; the "not observed" side is implicit (1 - likelihood).
#
# calibration (optional, mapping): effective display-mass settings for
#   the reported uncertainty band. The key name is retained for file-format
#   compatibility. All values are positive finite
#   numbers. Defaults live in the loader for old test fixtures, but the
#   shipped network carries the explicit block below so tuning can be
#   reviewed as data rather than inference-code edits.
#   min_n_eff: floor for effective display mass.
#   evidence_n_eff_contrib: per effective evidence-unit contribution.
#   conflict_n_eff_penalty: per cross-source conflict subtraction.
#
# Inference operates on the marginal posterior P(node=present | E)
# where E is the observed-evidence set for the queried domain. Exact
# inference via variable elimination — see ``recon_tool/bayesian.py``.
#
# Operator override
# -----------------
#
# A user-supplied ``~/.recon/priors.yaml`` can override the ``prior``
# field on any node listed here. Override is local-only; never shared,
# never sent over the wire, never persisted in cache. Operators use
# this to inject domain-specific base rates (e.g., a security team
# whose scope skews heavily M365 might raise the prior on
# m365_tenant from 0.30 to 0.70).
#
# Adding nodes
# ------------
#
# Stay under 20 nodes per per-domain inference. The network is a
# domain-modelling tool, not an attempt to encode every fingerprint.
# Each node should answer a question a human would ask ("are they
# federated?", "is email security strong?") — not "is slug X present?".
# Slug-level posteriors live in the existing ``fusion.py`` Beta layer.

version: 1

calibration:
  min_n_eff: 4.0
  evidence_n_eff_contrib: 1.0
  conflict_n_eff_penalty: 1.5

nodes:
  # ── Identity layer ─────────────────────────────────────────────────
  - name: m365_tenant
    description: "A Microsoft 365 or Entra tenant-compatible identity response, mail route, or DKIM endpoint was observed."
    prior: 0.30
    # The adapter emits this signal only for role-bearing identity, MX, or DKIM
    # evidence. A generic verification TXT fingerprint does not satisfy it.
    evidence:
      - signal: m365_tenant_observed
        likelihood: [0.95, 0.03]

  - name: google_workspace_tenant
    description: "A Google Workspace-compatible identity response, mail route, DKIM endpoint, or branded application CNAME was observed."
    prior: 0.25
    # The adapter emits this signal only for role-bearing identity, MX, DKIM,
    # or branded-application CNAME evidence. Verification TXT and NS records
    # do not satisfy it.
    evidence:
      - signal: google_workspace_tenant_observed
        likelihood: [0.92, 0.04]

  - name: federated_identity
    description: "An identity-discovery response reported or routed through federation."
    # v1.9.3: parents expanded to include google_workspace_tenant.
    # Federation exists without M365 (Okta + GWS, Auth0 + custom IdP,
    # standalone SAML); the v1.9.0 single-parent network systematically
    # under-attributed federation when the path didn't go through M365.
    # GWS path P() values are seeded; the v1.9.4 hardened-adversarial
    # corpus run will tighten them.
    parents: [m365_tenant, google_workspace_tenant]
    cpt:
      "m365_tenant=present,google_workspace_tenant=present": 0.50
      "m365_tenant=present,google_workspace_tenant=absent":  0.45
      "m365_tenant=absent,google_workspace_tenant=present":  0.35
      "m365_tenant=absent,google_workspace_tenant=absent":   0.08
    evidence:
      - signal: federated_sso_hub
        likelihood: [0.90, 0.05]

  - name: okta_idp
    description: "An identity-discovery redirect explicitly named Okta."
    # Stability note (v1.9.5 → v1.9.11): node clears criteria (a) and (b)
    # (evidence-response correctness, calibration in both regimes). v1.9.5
    # flagged criterion (c) (N >= 10 independent firings) as 'not yet';
    # v1.9.10's stratified synthetic corpus brought the synthetic firing
    # count above 10 (8 fixtures across GCP/Azure/Oracle/SSE strata fire
    # the node). The real-corpus run gated by v2.0 records the
    # authoritative criterion-(c) number — see
    # validation/v2.0-corpus-run.md.
    parents: [federated_identity]
    cpt:
      "federated_identity=present": 0.30
      "federated_identity=absent": 0.005
    evidence:
      - signal: okta_idp_observed
        likelihood: [0.92, 0.02]

  # ── Email security layer ──────────────────────────────────────────
  - name: email_gateway_present
    description: "The domain's MX route references a recognized third-party email gateway."
    prior: 0.18
    # This signal requires both a recognized gateway value and supporting MX
    # evidence. TXT account indicators and DMARC-report destinations do not
    # satisfy the gateway-route claim.
    evidence:
      - signal: email_gateway_mx_observed
        likelihood: [0.90, 0.02]

  # v1.9.3: replaced email_security_strong with two separate nodes
  # below. The v1.9.0 node parameterized its CPT over modern-mail-
  # provider presence (M365 / GWS / gateway) but tested DMARC/DKIM/SPF/
  # MTA-STS policy enforcement via its evidence bindings — different
  # claims, no CPT tuning could reconcile them. The split makes both
  # claims first-class. An operator who wants the conjunction can
  # compute it downstream from the two posteriors.

  - name: email_security_modern_provider
    description: "A recognized managed-mail identity response, mail route, DKIM endpoint, or third-party MX gateway was observed."
    parents: [m365_tenant, google_workspace_tenant, email_gateway_present]
    # CPT calibrated to *provider presence* given parents. Pure
    # propagation: no evidence bindings — provider presence is fully
    # captured by the parent slugs. The numbers preserve the v1.9.0
    # CPT structure for the provider-presence claim only.
    cpt:
      "m365_tenant=present,google_workspace_tenant=present,email_gateway_present=present": 0.99
      "m365_tenant=present,google_workspace_tenant=present,email_gateway_present=absent":  0.97
      "m365_tenant=present,google_workspace_tenant=absent,email_gateway_present=present":  0.97
      "m365_tenant=present,google_workspace_tenant=absent,email_gateway_present=absent":   0.95
      "m365_tenant=absent,google_workspace_tenant=present,email_gateway_present=present":  0.97
      "m365_tenant=absent,google_workspace_tenant=present,email_gateway_present=absent":   0.95
      "m365_tenant=absent,google_workspace_tenant=absent,email_gateway_present=present":   0.85
      "m365_tenant=absent,google_workspace_tenant=absent,email_gateway_present=absent":    0.05

  - name: email_security_policy_enforcing
    description: "Observable DMARC policy is enforcing (reject or quarantine); strict SPF and MTA-STS are supporting public signals."
    # Root node — policy enforcement is provider-independent. Many M365
    # / GWS tenants ship with weak policy (p=none); some self-hosted /
    # gateway-fronted setups enforce strictly. The two claims should
    # not be entangled in the topology.
    # Prior grounded on the 2026-06 corpus: 61.7% of 5,238 domains publish an
    # enforcing DMARC policy (p=reject/quarantine), so the prior moves from a
    # hand-set 0.25 to 0.62 (CAL12). A directionally-accurate estimate the
    # maintainer-validation loop re-checks each release (roadmap PV2), not a
    # frozen value.
    #
    # v1.9.6: removed `dkim_present` from the evidence list (it was
    # `[0.85, 0.30]`, LR ≈ 2.83). Concept: DKIM publication is a
    # deliverability hygiene signal, not a policy-enforcement signal.
    # Many domains publish DKIM without enforcing DMARC, so the
    # 2.83× likelihood ratio overstated the evidence DKIM provides
    # about the node's actual claim. The v1.9.5 stability report's
    # (b1) failure (10 of 129 det-positive-HIGH non-sparse
    # observations had posterior ≈ 0.486, all
    # `evidence_used = (signal:dkim_present,)` alone) surfaced this
    # conceptual gap. The corpus-fitting reflex was to lower
    # `[0.85, 0.30]` to `[0.85, 0.20]` so dkim-only domains would
    # clear posterior > 0.5; that would have improved the criterion
    # number while making the node a worse predictor of what its
    # name says. The right answer was removing the binding — the
    # node's claim is enforcement, and DKIM doesn't speak to
    # enforcement. The remaining four bindings (`dmarc_reject`,
    # `dmarc_quarantine`, `mta_sts_enforce`, `spf_strict`) all
    # speak directly to it. See CONTRIBUTING.md "CPT-change
    # discipline" → "Worked example 2" for the worked rejection.
    prior: 0.62
    # CAL14: this node is *declarative*. DMARC / SPF / MTA-STS are public
    # declarations whose absence cannot be hidden from passive DNS, so a signal
    # that could fire but did not is genuine disconfirming evidence (unlike
    # hideable infrastructure, which keeps the LR=1 absence rule). Semantic
    # ruling (definition A): "enforcing" means an observable DMARC
    # reject/quarantine policy; strict SPF alone is hygiene, not enforcement
    # (RFC 9989 makes DMARC the policy/alignment layer over SPF/DKIM). The DMARC
    # policy level is mutually exclusive (reject XOR quarantine XOR none), so the
    # two DMARC bindings share a `dmarc_policy` group whose whole-absence
    # likelihood is given explicitly rather than as a complement-product.
    missingness: declarative
    group_absence:
      # P(no DMARC policy | enforcing) is low (an enforcing org publishes one);
      # P(no DMARC policy | not enforcing) is high. Construct-noise values, not
      # corpus-fitted; the absence of the DMARC group is the main disconfirmer.
      dmarc_policy: [0.05, 0.85]
    evidence:
      - signal: dmarc_reject
        likelihood: [0.92, 0.04]
        group: dmarc_policy
      - signal: dmarc_quarantine
        likelihood: [0.55, 0.10]
        group: dmarc_policy
      # mta_sts regrounded on the 2026-06 corpus: only ~6% of enforcing domains
      # publish MTA-STS (the old [0.70, 0.05] claimed 70%, an order of magnitude
      # off; CAL12 base-rate correction, re-checked by PV2). The low present-
      # likelihood also makes its absence near-neutral (complement [0.94, 0.99],
      # LR ~1), which is correct: MTA-STS non-adoption is the norm even among
      # enforcers, so it disconfirms only weakly.
      - signal: mta_sts_enforce
        likelihood: [0.06, 0.01]
      # spf_strict regrounded on the 2026-06 corpus: P(strict SPF | enforcing)
      # ~0.53, P(strict SPF | not enforcing) ~0.27 (LR ~2.0), close to the prior
      # hand-set value. Under definition A strict SPF is supporting, not
      # sufficient: its absence mildly disconfirms (complement [0.47, 0.73]).
      - signal: spf_strict
        likelihood: [0.53, 0.27]

  # ── Infrastructure layer ──────────────────────────────────────────
  - name: cdn_fronting
    description: "A public CNAME references a recognized CDN or edge endpoint."
    prior: 0.45
    evidence:
      - signal: cdn_cname_observed
        likelihood: [0.92, 0.03]

  - name: aws_hosting
    description: "A public CNAME references a recognized AWS service endpoint."
    prior: 0.40
    # The signal is emitted only for a role-bearing AWS CNAME. Route 53 NS and
    # AWS CAA authorization are separate DNS/PKI roles and do not satisfy it.
    evidence:
      - signal: aws_endpoint_cname_observed
        likelihood: [0.85, 0.05]
