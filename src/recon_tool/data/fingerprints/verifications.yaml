# Domain-verification TXT fingerprints harvested from the private validation
# corpus (TXT-prefix discovery mine over ~5000 apexes). Each prefix is a
# vendor's domain-verification token, planted when an org binds a domain to a
# SaaS tenant. Confirmed absent from the catalog before adding (v1.9.23).
#
# Loaded by recon_tool.fingerprints.load_fingerprints.

fingerprints:
- name: Docker
  slug: docker
  category: Infrastructure
  confidence: high
  detections:
  - type: txt
    pattern: ^docker-verification=
    reference: https://docs.docker.com/security/for-admins/domain-management/
    description: >-
      Docker domain-verification TXT (`docker-verification=`). Indicates
      the domain is bound to a Docker (Docker Hub / Docker Business)
      organization for SSO and image management. Does not prove active
      seats; verification ships before users are provisioned.
