    pattern: s3.amazonaws.com
    reference: https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html
    description: >-
      CNAME terminating in s3.amazonaws.com (AWS S3 REST API
      endpoint). Indicates the domain proxies to an S3
      bucket, typically for object storage or static-asset
      serving. Note that this does not by itself indicate
      static-website-hosting mode is enabled; for that, the
      `s3-website-*` patterns apply.
  - type: cname
    pattern: .s3-website-
    reference: https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html
    description: >-
      CNAME containing `.s3-website-` (AWS S3 static-website
      hosting endpoint, regional form like
      `s3-website-us-east-1.amazonaws.com`). Indicates the
      bucket is configured for static-website hosting and
      the domain serves through that endpoint.
  - type: cname
    pattern: .s3-website.
    reference: https://docs.aws.amazon.com/AmazonS3/latest/userguide/WebsiteHosting.html
    description: >-
      CNAME containing `.s3-website.` (newer-style S3
      static-website endpoint, like
      `s3-website.us-east-2.amazonaws.com`). Same static-
      website-hosting semantics as the dash-form pattern.
