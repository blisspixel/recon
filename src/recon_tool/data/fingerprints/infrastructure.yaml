# Infrastructure fingerprints. Cloud providers, CDNs, DNS, CAs, container and CI/CD platforms.
#
# Loaded by recon_tool.fingerprints.load_fingerprints.
# Custom overrides: ~/.recon/fingerprints.yaml (additive only).

fingerprints:
- name: GitHub
  slug: github
  category: DevTools & Infrastructure
  confidence: high
  product_family: GitHub
  parent_vendor: Microsoft
  detections:
  - type: txt
    pattern: ^github-site-verification=
    reference: https://docs.github.com/en/organizations/managing-organization-settings/verifying-or-approving-a-domain-for-your-organization
    description: >-
      GitHub domain-verification TXT (GitHub is a Microsoft
      property since the 2018 acquisition). Indicates the
      domain is verified to a GitHub organization, typically
      a precondition for using verified-domain features like
      domain-restricted SAML SSO or Verified Domain badges on
      org profiles. Compare with `_github-pages-challenge` for
      the Pages-specific verification.
  - type: txt
    pattern: ^_github-pages-challenge
    reference: https://docs.github.com/en/pages/configuring-a-custom-domain-for-your-github-pages-site/verifying-your-custom-domain-for-github-pages
    description: >-
      GitHub Pages domain-challenge TXT (found at
      `_github-pages-challenge-<org>.<domain>`). Indicates the
      domain has been verified for use as a custom Pages site.
      Distinct from org-level domain verification; Pages
      verification is per-site.
- name: GitLab
  slug: gitlab
  category: DevTools & Infrastructure
  confidence: high
  detections:
  - type: txt
    pattern: ^gitlab-pages-verification-code=
    reference: https://docs.gitlab.com/ee/user/project/pages/custom_domains_ssl_tls_certification/
    description: >-
      GitLab Pages domain-verification TXT at zone apex.
      Indicates the domain is verified for use as a custom
      GitLab Pages site. Common on GitLab SaaS
      (gitlab.com); self-managed GitLab installations can
      also use this verification.
  - type: subdomain_txt
    pattern: _gitlab-pages-verification-code:.
    reference: https://docs.gitlab.com/ee/user/project/pages/custom_domains_ssl_tls_certification/
    description: >-
      GitLab Pages subdomain-verification TXT (found at a
      designated `_gitlab-pages-verification-code.<subdomain>`
      record). Same purpose as the apex form; used when the
      Pages site lives at a subdomain rather than the apex.
