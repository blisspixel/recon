- name: Cloudflare
  slug: cloudflare
  parent_vendor: Cloudflare
  category: Infrastructure
  confidence: high
  display_group: Infrastructure
  detections:
  - type: txt
    pattern: ^cloudflare-verify=
    reference: https://developers.cloudflare.com/dns/
    description: >-
      Cloudflare domain-verification TXT (`cloudflare-verify=`
      prefix). Indicates the domain is verified to a
      Cloudflare account, used for some Cloudflare products
      (Cloudflare for Teams, Cloudflare Pages custom domains,
      and so on).
  - type: ns
    pattern: cloudflare.com
    reference: https://developers.cloudflare.com/dns/zone-setups/full-setup/
    description: >-
      NS records terminate at Cloudflare nameservers. The
      domain uses Cloudflare as authoritative DNS, a common
      precondition for using Cloudflare's CDN, WAF, or DNS
      products on the apex. Does not by itself prove the apex
      sits behind Cloudflare's CDN; those are separate
      products on the same vendor.
  - type: cname
    pattern: cloudflare
    reference: https://developers.cloudflare.com/dns/
    description: >-
      CNAME containing the string `cloudflare`. Lower-
      specificity fallback for Cloudflare-product CNAMEs
      that do not match the more-specific patterns
      elsewhere in the catalog.
- name: AWS Route 53
  slug: aws-route53
  product_family: AWS
  parent_vendor: Amazon
  category: Infrastructure
  confidence: high
  detections:
  - type: ns
    pattern: awsdns
    reference: https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/Welcome.html
    description: >-
      NS records contain `awsdns` (AWS Route 53 nameserver
      hostnames follow the `ns-*.awsdns-*.{com,net,org,co.uk}`
      pattern). Indicates the domain uses Route 53 as
      authoritative DNS. Does not by itself indicate the
      domain's workloads run on AWS; many domains use Route
      53 for DNS while hosting elsewhere.
- name: Azure DNS
  slug: azure-dns
  category: Infrastructure
  confidence: high
  detections:
  - type: ns
    pattern: azure-dns
    reference: https://learn.microsoft.com/en-us/azure/dns/dns-overview
    description: >-
      NS records contain `azure-dns` (Azure DNS nameserver
      hostnames follow the `ns*.azure-dns.{com,net,org,info}`
      pattern). Indicates the domain uses Azure DNS as
      authoritative DNS. Does not by itself indicate Azure
      hosts the domain's workloads.
- name: Google Cloud DNS
  slug: gcp-dns
  category: Infrastructure
  confidence: high
  detections:
  - type: ns
    pattern: google.com
    reference: https://cloud.google.com/dns/docs/overview
    description: >-
      NS records terminating at Google Cloud DNS
      nameservers (`ns-cloud-{a,b,c,d}*.googledomains.com`
      and `*.google.com` patterns). Indicates the domain
      uses Google Cloud DNS as authoritative DNS. Note that
      a Google-NS match does not by itself distinguish
      Cloud DNS from legacy Google Domains DNS or from
      Workspace-managed DNS; the underlying service is GCP
      Cloud DNS in the modern configuration.
