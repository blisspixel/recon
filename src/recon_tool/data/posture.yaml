# posture.yaml — neutral observation rules for posture analysis
# Version: 2026-04-11
# Observations are factual statements about domain configuration.
# They do NOT prescribe action, assign blame, or frame findings as attacks/defenses.

observations:

  # ── Email posture ─────────────────────────────────────────────────────

  - name: gateway_without_dmarc_enforcement
    category: email
    salience: high
    condition:
      slugs_any: [proofpoint, mimecast, barracuda, trendmicro, cisco-ironport, cisco-email, symantec, trellix]
      slugs_min: 1
      metadata:
        - field: dmarc_effective_policy
          operator: neq
          value: reject
        - field: dmarc_effective_policy
          operator: neq
          value: quarantine
    template: "Email-security vendor indicator ({matched_slugs}) is observed while effective DMARC policy is not reject or quarantine"

  - name: no_dmarc_record
    category: email
    salience: high
    condition:
      metadata:
        - field: dmarc_policy
          operator: eq
          value: "none"
    template: "DMARC policy is set to none — email sender verification is not enforcing at the domain level"

  - name: strong_email_security
    category: email
    salience: low
    condition:
      metadata:
        - field: email_security_score
          operator: gte
          value: 4
    template: "Public email-control evidence score is {email_security_score}/5; at least four modelled control indicators were observed"

  - name: weak_email_security
    category: email
    salience: high
    condition:
      metadata:
        - field: email_posture_observed
          operator: eq
          value: 1
        - field: email_security_score
          operator: lte
          value: 1
    template: "At most one of five modelled public email-control indicators was observed"

  - name: heavy_outbound_email
    category: email
    salience: medium
    condition:
      slugs_any: [sendgrid, mailgun, postmark, sparkpost, brevo, mailchimp, aws-ses]
      slugs_min: 2
    template: "Multiple email-sender vendor indicators observed ({matched_slugs})"

  - name: email_deliverability_management
    category: email
    salience: medium
    condition:
      slugs_any: [autospf, ondmarc, dmarcian, easydmarc, valimail]
      slugs_min: 1
    template: "SPF-flattening or DMARC-management vendor indicator observed ({matched_slugs})"

  - name: dmarc_phased_rollout
    category: email
    salience: medium
    condition:
      metadata:
        - field: dmarc_pct
          operator: lte
          value: 99
        - field: dmarc_policy
          operator: neq
          value: none
    template: "Published DMARC pct is below 100 (pct={dmarc_pct}%); only that fraction is subject to the stated policy"
    explain: "The published DMARC pct tag is below 100, so only that fraction of failing messages is subject to the stated policy. The record does not establish why the publisher selected that value."

  # ── Identity posture ──────────────────────────────────────────────────

  - name: federated_identity
    category: identity
    salience: medium
    condition:
      metadata:
        - field: auth_type
          operator: eq
          value: Federated
    template: "Microsoft namespace discovery returned Federated; an external authentication endpoint was advertised"

  - name: managed_identity
    category: identity
    salience: low
    condition:
      metadata:
        - field: auth_type
          operator: eq
          value: Managed
    template: "Microsoft namespace discovery returned Managed; the response did not identify an external federation endpoint"

  - name: identity_provider_detected
    category: identity
    salience: medium
    condition:
      slugs_any: [okta, auth0, descope, onelogin, duo, ping-identity, cyberark]
      slugs_min: 1
    template: "Identity-vendor indicator observed ({matched_slugs})"

  # ── Infrastructure posture ────────────────────────────────────────────

  - name: multi_cloud_infrastructure
    category: infrastructure
    salience: medium
    condition:
      slugs_any: [aws-route53, aws-cloudfront, aws-elb, aws-s3, azure-dns, azure-cdn, azure-appservice, gcp-dns, gcp-app]
      slugs_min: 3
    template: "Multiple cloud-vendor catalog indicators co-observed ({matched_slugs}); provider roles and diversity are unresolved"

  - name: edge_layering
    category: infrastructure
    salience: medium
    condition:
      slugs_any: [cloudflare, akamai, fastly, imperva]
      slugs_min: 2
    template: "Multiple edge-vendor catalog indicators co-observed ({matched_slugs}); source roles may differ"

  - name: single_dns_provider
    category: infrastructure
    salience: low
    condition:
      slugs_any: [aws-route53, azure-dns, gcp-dns, cloudflare]
      slugs_min: 1
      slugs_max: 1
    template: "One infrastructure-provider indicator observed ({matched_slugs}); this rule does not retain the evidence role"

  - name: edge_compute_detected
    category: infrastructure
    salience: low
    condition:
      slugs_any: [vercel, netlify, flyio, railway, fastly, render]
      slugs_min: 2
    template: "Multiple edge or serverless platform indicators observed ({matched_slugs})"

  # ── SaaS footprint ───────────────────────────────────────────────────

  - name: broad_saas_adoption
    category: saas_footprint
    salience: medium
    condition:
      slugs_any: [slack, notion, miro, atlassian, figma, dropbox, clickup, asana, monday, loom, canva, zoom, airtable, github, gitlab, vercel, netlify, salesforce, hubspot, zendesk, intercom, datadog, newrelic]
      slugs_min: 6
    template: "Broad public SaaS indicator set observed: {matched_count} catalog matches across collaboration, development, and business categories"

  - name: ai_tooling_detected
    category: saas_footprint
    salience: medium
    condition:
      slugs_any: [openai, anthropic, mistral, perplexity, crewai-aid, langsmith, mcp-discovery, dify, n8n, autogen]
      slugs_min: 1
    template: "AI/LLM vendor indicator observed ({matched_slugs})"

  - name: agentic_ai_detected
    category: saas_footprint
    salience: medium
    condition:
      slugs_any: [crewai-aid, langsmith, mcp-discovery, dify, n8n, autogen]
      slugs_min: 1
    template: "Agentic AI platform indicators observed ({matched_slugs})"

  - name: supply_chain_security_detected
    category: saas_footprint
    salience: medium
    condition:
      slugs_any: [github-advanced-security, sonatype, snyk, cosign-attestation]
      slugs_min: 1
    template: "Software-supply-chain security vendor indicator observed ({matched_slugs})"

  - name: security_tooling_detected
    category: saas_footprint
    salience: low
    condition:
      slugs_any: [crowdstrike, sentinelone, sophos, zscaler, netskope, paloalto, cato, wiz, knowbe4]
      slugs_min: 2
    template: "Multiple security-vendor indicators observed ({matched_slugs})"

  # ── Certificate posture ───────────────────────────────────────────────

  - name: high_cert_issuance
    category: certificate
    salience: high
    condition:
      metadata:
        - field: issuance_velocity
          operator: gte
          value: 20
    template: "High certificate issuance activity — {issuance_velocity} certificates issued in the last 90 days"

  - name: low_cert_activity
    category: certificate
    salience: low
    condition:
      metadata:
        - field: issuance_velocity
          operator: lte
          value: 2
    template: "Low certificate issuance activity — {issuance_velocity} certificates issued in the last 90 days"

  # ── Consistency observations ──────────────────────────────────────────

  - name: dual_email_provider
    category: consistency
    salience: high
    condition:
      slugs_any: [microsoft365, google-workspace]
      slugs_min: 2
    template: "Microsoft 365 and Google Workspace indicators are co-observed; active delivery, historical residue, and verification-only registration remain compatible explanations"

  - name: file_sharing_sprawl
    category: consistency
    salience: medium
    condition:
      slugs_any: [dropbox, box, egnyte]
      slugs_min: 2
    template: "Multiple file-sharing platform indicators observed ({matched_slugs})"

  - name: consumer_saas_sprawl
    category: consistency
    salience: medium
    condition:
      slugs_any: [canva, dropbox, mailchimp, zoom, airtable, notion, monday, clickup, loom]
      slugs_min: 3
    template: "Multiple SaaS vendor indicators observed ({matched_slugs})"

  # ── Google Workspace posture ──────────────────────────────────────────

  - name: google_federated_identity
    category: identity
    salience: medium
    condition:
      slugs_any: [google-federated]
      slugs_min: 1
    template: "Google Workspace identity discovery routed to an external identity provider"

  - name: google_managed_identity
    category: identity
    salience: low
    condition:
      slugs_any: [google-managed]
      slugs_min: 1
    template: "Google managed-identity indicator observed; external federation was not observed in the bounded response"

  - name: mta_sts_enforcing
    category: email
    salience: low
    condition:
      slugs_any: [mta-sts-enforce]
      slugs_min: 1
    template: "MTA-STS policy mode enforce observed"

  - name: tls_rpt_configured
    category: email
    salience: low
    condition:
      slugs_any: [tls-rpt]
      slugs_min: 1
    template: "TLS-RPT record observed; report delivery is not verified"
