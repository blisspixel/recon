version: 2

updates:
  # GitHub Actions — weekly bumps so we never fall behind on Node deprecations
  # or transitive CVEs in the pinned actions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions:
        patterns:
          - "*"

  # Python runtime + dev dependencies via pip/uv. Weekly cadence keeps the
  # surface current without drowning the repo in PR noise. Major-version
  # bumps are split out so we can review any breaking runtime changes
  # (httpx, dnspython, typer, Rich) separately from routine patch bumps.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # pre-commit hook revisions (ruff-pre-commit, actionlint, etc.). Dependabot
  # gained native pre-commit support in 2026-03; without it the pinned hook revs
  # silently go stale — the exact "standards drift" failure mode we guard
  # against. Weekly, grouped, comments preserved.
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      pre-commit:
        patterns:
          - "*"
