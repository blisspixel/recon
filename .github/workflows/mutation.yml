name: Mutation gate

# Mutation testing promoted to a blocking gate with a score floor
# (roadmap, assurance track). cosmic-ray mutates the inference core
# (recon_tool/bayesian.py, 1,642 mutants) and runs the focused kill-set
# against every mutant; the job fails if the survival rate exceeds the
# floor below. Full design, kill-set rationale, and survivor policy:
# validation/mutation-gate.md.
#
# The job runs when the mutated surface or its kill-set changes (where
# it is a required, blocking check), on a weekly schedule (so drift in
# the toolchain or an unnoticed interaction still surfaces), and on
# demand. It deliberately does not run on every push: a full sweep
# costs ~30 minutes, and a docs or catalog change cannot change the
# mutation score of an untouched module.

on:
  push:
    branches: [main]
    paths:
      - "recon_tool/bayesian.py"
      - "tests/test_bayesian_unit_math.py"
      - "tests/test_bayesian_loader_edges.py"
      - "tests/test_bayesian_inference.py"
      - "tests/test_bayesian_canonical.py"
      - "tests/test_bayesian_evidence_groups.py"
      - "tests/test_drift_check.py"
      - "tests/test_bayesian_validation_rounds.py"
      - "tests/test_bayesian_topology.py"
      - "tests/test_bayesian_dag.py"
      - "mutation.toml"
      - ".github/workflows/mutation.yml"
  pull_request:
    branches: [main]
    paths:
      - "recon_tool/bayesian.py"
      - "tests/test_bayesian_unit_math.py"
      - "tests/test_bayesian_loader_edges.py"
      - "tests/test_bayesian_inference.py"
      - "tests/test_bayesian_canonical.py"
      - "tests/test_bayesian_evidence_groups.py"
      - "tests/test_drift_check.py"
      - "tests/test_bayesian_validation_rounds.py"
      - "tests/test_bayesian_topology.py"
      - "tests/test_bayesian_dag.py"
      - "mutation.toml"
      - ".github/workflows/mutation.yml"
  schedule:
    # Weekly, Monday 06:17 UTC (off the top of the hour to avoid the
    # scheduled-job thundering herd).
    - cron: "17 6 * * 1"
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutate:
    runs-on: ubuntu-latest
    # The 2026-06 sweeps measured 62 and 75+ minutes on this runner with
    # the leaner kill-set; the extended kill-set adds per-survivor cost.
    timeout-minutes: 150
    env:
      # .python-version pins the local toolchain to 3.14; force the CI
      # interpreter, mirroring the test matrix.
      UV_PYTHON: "3.11"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies (dev + mutation group)
        run: uv sync --group mutation

      - name: Baseline (kill-set must pass unmutated)
        # A failing or flaky kill-set would count every mutant as killed
        # and make the score meaningless; prove it green first. The
        # --group flag keeps uv run's implicit sync from dropping the
        # mutation group installed above.
        run: uv run --group mutation cosmic-ray baseline mutation.toml

      - name: Initialize session
        run: uv run --group mutation cosmic-ray init mutation.toml mutation.sqlite

      - name: Filter equivalent-by-construction operators
        # Skips the annotation-union mutants (see mutation.toml for the
        # rationale); they are unkillable by any test and would only pad
        # the survivor count.
        run: uv run --group mutation cr-filter-operators mutation.sqlite mutation.toml

      - name: Execute mutants
        run: uv run --group mutation cosmic-ray exec mutation.toml mutation.sqlite

      - name: Report
        run: uv run --group mutation cr-report mutation.sqlite | tail -n 5

      - name: Enforce score floor (survival must stay under 12%)
        # Kill score >= 88% over tested mutants. scripts/mutation_floor.py
        # rather than cr-rate: cr-rate counts filter-skipped jobs as
        # non-kills, which would inflate the rate; the script's semantics
        # are survived / (killed + survived), with incompetent or pending
        # jobs failing outright. The floor sits above the documented
        # equivalent-mutant residue (measured survival ~9%, almost all of
        # it provably equivalent: identity / string-ordering comparisons,
        # x1.0 arithmetic, frozen-dataclass flags, always-true contract
        # decorators, order-invariant loops). It ratchets the current kill
        # strength and fails when real coverage regresses. Full survivor
        # classification: validation/mutation-gate.md.
        run: uv run python scripts/mutation_floor.py mutation.sqlite --fail-over 12

      - name: Dump surviving mutants (diagnostics)
        # Survivor diffs and test output, so a floor failure is
        # diagnosable from the log without re-running the hour-long
        # sweep. Capped: the artifact below carries the full session.
        if: failure()
        run: uv run --group mutation cr-report mutation.sqlite --surviving-only --show-diff --show-output | head -n 800

      - name: Upload session DB
        # The full per-mutant record (operator, diff, test output,
        # outcome) for post-mortem analysis on any outcome.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-session
          path: mutation.sqlite
          retention-days: 14
