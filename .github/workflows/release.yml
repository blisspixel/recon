name: Release

on:
  push:
    tags:
      - "v*"

# Workflow-level default: read-only. Each job explicitly opts into any
# elevated scope it actually needs. The prior ``id-token: write`` here
# granted OIDC-token minting to every job — including ``test`` and
# ``build`` which install and execute dependency code. A compromised
# dependency could mint a token and publish to PyPI under our trusted-
# publisher identity. Scoping to ``publish-pypi`` / ``github-release``
# respects least-privilege.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -q --cov=recon_tool --cov-fail-under=80

      - name: Lint
        run: uv run ruff check recon_tool/

      - name: Validate built-in fingerprints
        # Mirrors ci.yml so a YAML schema or duplicate-slug regression
        # cannot reach PyPI just because release.yml's test job missed it.
        # This check pools slugs across files and rejects same-slug entries
        # whose display names disagree.
        run: uv run python scripts/validate_fingerprint.py recon_tool/data/fingerprints/ --quiet

      - name: Export runtime requirements
        run: uv export --frozen --no-dev --no-emit-project --no-hashes --format requirements.txt --output-file .ci-audit-requirements.txt

      - name: Audit dependencies
        run: uv run pip-audit -r .ci-audit-requirements.txt

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies (for SBOM generation)
        run: uv sync --extra dev

      - name: Build package
        run: uv build

      - name: Generate CycloneDX SBOM
        # pip-audit emits CycloneDX from the same locked requirements
        # the audit gate validates, so the SBOM and the audit report
        # describe the same dependency set. The SBOM goes to a
        # separate ``sbom/`` directory rather than ``dist/`` so the
        # PyPI publish job only sees wheels and sdists; a stray JSON
        # file in dist/ is harmless to twine's default filter but the
        # explicit separation removes the question.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p sbom
          uv export --frozen --no-dev --no-emit-project --no-hashes --format requirements.txt --output-file .ci-audit-requirements.txt
          uv run pip-audit -r .ci-audit-requirements.txt --format=cyclonedx-json --output "sbom/recon-tool-${VERSION}.cdx.json" --no-deps || true
          # The "|| true" catches the audit's vulnerability-finding
          # exit code; the SBOM file is written regardless. The
          # audit *gate* is in the ``test`` job — this step produces
          # the SBOM artifact, not the audit verdict.
          test -f "sbom/recon-tool-${VERSION}.cdx.json"
          ls -la sbom/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          cat release_notes.md

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Download SBOM artifact
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: sbom/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "v${{ steps.changelog.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          # Attach wheels, sdist, and the CycloneDX SBOM. Consumers
          # pull the SBOM by stable name (recon-tool-<version>.cdx.json)
          # for downstream supply-chain audits.
          files: |
            dist/*
            sbom/*
