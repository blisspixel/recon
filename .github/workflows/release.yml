name: Release

on:
  push:
    tags:
      - "v*"

# Workflow-level default: read-only. Each job explicitly opts into any
# elevated scope it actually needs. The prior ``id-token: write`` here
# granted OIDC-token minting to every job, including ``test`` and
# ``build`` which install and execute dependency code. A compromised
# dependency could mint a token and publish to PyPI under our trusted-
# publisher identity. Scoping to ``publish-pypi`` / ``github-release``
# respects least-privilege.
#
# Supply-chain isolation contract (v1.9.3.3+):
#
#   * ``test`` job installs dev deps and runs the complete local gate plus
#     dependency audit. Dev deps execute here. No dist/
#     exists, so a compromised dev dep cannot tamper with release
#     artifacts from this job.
#   * ``build`` job is PURE: it does not create or sync a project
#     environment. Exact uv creates one sdist, then one wheel from that sdist,
#     using the committed hash-locked backend graph; ``dist/`` is uploaded
#     immediately. No additional code executes between build and upload.
#     ``actions/upload-artifact`` seals the bytes into GitHub-managed storage.
#   * ``package-smoke`` downloads the sealed distribution into a separate
#     read-only job, requires one tag-matching wheel and sdist, and executes
#     both installed entry points. Publication waits for this gate, so
#     source-tree tests cannot mask a broken package entry point.
#   * ``sbom`` job runs on a separate runner. It installs pip-audit
#     in its own workspace and generates the CycloneDX SBOM from the
#     locked-requirements text. dist/ does not exist in this runner,
#     so even a compromised pip-audit cannot reach release artifacts.
#   * ``attest`` signs the sealed dist artifacts and completed SBOM as one
#     subject set. ``export-attestations`` downloads those signed bundles and
#     stores them as a release-asset-friendly ``*.intoto.jsonl`` artifact. It
#     runs no project dependency code.
#   * ``publish-pypi`` waits for the package smoke, provenance attestation, and
#     SBOM paths. A separate read-only parity job then proves PyPI serves the
#     sealed wheel and sdist bytes before ``github-release`` can publish or
#     clobber the matching GitHub assets during partial-release recovery.
#     These jobs never re-build, never re-install dev deps, and never execute
#     project dependency code. A pre-publication trust failure blocks both
#     channels. A parity failure after PyPI accepts immutable files blocks the
#     GitHub Release and leaves a visible partial-publication state that may be
#     recovered only by proving the sealed bytes match the existing PyPI pair.
#
# The threat the contract addresses: if a transitive dev dependency
# of pip-audit (or pip-audit itself) is compromised at the locked
# version, executing it cannot modify dist/ because dist/ is not
# on the same runner. This closes the v1.9.3.1 audit finding
# "Dev deps can tamper release artifacts" (HIGH).
permissions:
  contents: read

# `.python-version` pins the local / dev toolchain to 3.14, and uv reads it
# unless UV_PYTHON is set. Every job here installs Python 3.11 (the supported
# floor) via setup-python, so pin uv to the same interpreter workflow-wide;
# otherwise uv sync / export / pip-audit would resolve and audit against 3.14,
# not the released runtime floor.
env:
  UV_PYTHON: "3.11"

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Fetch current main ref
        run: git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"

      - name: Validate release tag, notes, and ancestry
        run: >-
          python3 scripts/validate_release_tag.py
          --tag "$GITHUB_REF_NAME"
          --sha "$GITHUB_SHA"
          --main-ref refs/remotes/origin/main

  test:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # Release tests revalidate every historical documentation receipt.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.17"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Require full Git history
        shell: bash
        run: |
          if [ "$(git rev-parse --is-shallow-repository)" != "false" ]; then
            echo "::error::Release receipt validation requires full Git history."
            exit 1
          fi

      - name: Verify stable and candidate MCP SDK compatibility
        # A tag must satisfy the same exact-pin boundary as main before the
        # build job can seal artifacts for publication.
        run: >-
          uv run python scripts/check_mcp_compatibility.py
          --sdk-version 1.28.1
          --sdk-version 2.0.0b1
          --require-compatible 1.28.1
          --require-compatible 2.0.0b1

      - name: Run complete local quality gate
        # A manually pushed tag cannot bypass the deterministic gate that
        # maintainers run before release. This includes lint, types, branch
        # coverage, generated artifacts, Markdown links, and repository
        # hygiene checks.
        shell: bash
        run: |
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          if [ -n "$previous_tag" ]; then
            text_range="${previous_tag}..${GITHUB_SHA}"
          else
            empty_tree="$(git hash-object -t tree /dev/null)"
            text_range="${empty_tree}..${GITHUB_SHA}"
          fi
          uv run python scripts/check.py --text-range "$text_range"

      - name: Export runtime requirements
        # Hash-pinned (no --no-hashes): the exported requirements carry
        # per-package sha256 hashes, so the audit reads a hash-pinned
        # surface. pip-audit handles hashed requirements.
        run: uv export --frozen --no-dev --no-emit-project --format requirements.txt --output-file .ci-audit-requirements.txt

      - name: Audit dependencies
        run: uv run python scripts/run_dependency_audit.py -r .ci-audit-requirements.txt

  build:
    # Pure build job. The supply-chain isolation contract requires
    # that no project environment is installed and no additional dependency
    # code executes in this workspace. The exact uv release constructs one
    # sdist and then one wheel from that sdist under the hash-locked isolated
    # build graph. ``actions/upload-artifact`` immediately seals the
    # result. Do not add ``uv sync``, pip-audit, SBOM generation, ruff,
    # pyright, pytest, or any other project-dependency execution here. Those
    # belong in jobs that do not touch dist/.
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.17"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Pin deterministic build timestamp
        # Pin file mtimes in the wheel and sdist to the tagged commit's
        # committer timestamp. ci.yml checks matching hashes across two builds
        # under the same exact uv and hash-locked backend graph; it does not
        # claim cross-environment byte identity. Hatchling and uv honor
        # SOURCE_DATE_EPOCH. Checkout is shallow, but the tagged
        # commit is present, so ``git log -1`` reads its timestamp. This is a git
        # read, not project dependency code, so the supply-chain isolation
        # contract (no dependency code between build and seal) is unaffected.
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Build package
        run: |
          uv build --sdist --out-dir dist --build-constraints build-constraints.txt --require-hashes
          uv build --wheel dist/recon_tool-*.tar.gz --out-dir dist --build-constraints build-constraints.txt --require-hashes

      # IMMEDIATE upload: nothing executes between build and seal.
      # The artifact bytes are stored in GitHub-managed artifact
      # storage at this point; downstream jobs read from there, not
      # from this runner's filesystem.
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  package-smoke:
    # Execute the sealed wheel in a separate low-privilege workspace. The pure
    # build job still uploads immediately, and publication cannot proceed if
    # either supported installed entry path fails here.
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.17"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Smoke-test sealed wheel entry points
        run: |
          set -euo pipefail
          artifacts=(dist/*)
          wheels=(dist/recon_tool-*-py3-none-any.whl)
          sdists=(dist/recon_tool-*.tar.gz)
          if [ "${#artifacts[@]}" -ne 2 ] || [ ! -f "${artifacts[0]}" ] || [ ! -f "${artifacts[1]}" ] || \
             [ "${#wheels[@]}" -ne 1 ] || [ ! -f "${wheels[0]}" ] || \
             [ "${#sdists[@]}" -ne 1 ] || [ ! -f "${sdists[0]}" ]; then
            echo "Expected exactly one canonical wheel and one canonical sdist in dist" >&2
            exit 1
          fi
          wheel="${wheels[0]}"
          version="${GITHUB_REF_NAME#v}"
          expected_wheel="dist/recon_tool-${version}-py3-none-any.whl"
          expected_sdist="dist/recon_tool-${version}.tar.gz"
          if [ "$wheel" != "$expected_wheel" ] || [ "${sdists[0]}" != "$expected_sdist" ]; then
            echo "Artifact names do not match the validated release tag" >&2
            exit 1
          fi
          uv tool run --isolated --from "$wheel" recon --version
          uv run --no-project --isolated --with "$wheel" python -m recon_tool --version

  attest:
    # SLSA build-provenance attestation. Kept in its own job, like
    # publish-pypi and github-release, so the supply-chain isolation
    # contract holds: this job downloads the sealed artifacts and runs
    # NO project dependency code, so the id-token it is granted cannot be
    # minted by a compromised dependency. It signs a provenance
    # attestation (GitHub-native, OIDC) linking the wheel, sdist, and
    # completed SBOM to this workflow run; verify later with
    # `gh attestation verify`.
    # Same-job deterministic-build evidence (SOURCE_DATE_EPOCH, gated in ci.yml) and
    # sigstore-signed PyPI attestations (PEP 740, in the publish-pypi job)
    # now ship alongside this; only the full SLSA L3 generator workflow
    # stays deferred as disproportionate (see docs/supply-chain.md).
    needs: [build, sbom]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom
          path: sbom/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            dist/*
            sbom/*

  export-attestations:
    # GitHub artifact attestations live in the GitHub attestation store, but
    # OpenSSF Scorecard's Signed-Releases check looks for release assets with a
    # signature/provenance filename. Export the signed attestation bundles into a
    # release-asset-friendly `*.intoto.jsonl` file without introducing keys,
    # mutable action refs, or project dependency execution.
    needs: [build, sbom, attest]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom
          path: sbom/

      - name: Export attestation bundles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p provenance
          out="$GITHUB_WORKSPACE/provenance/recon-tool-${version}.intoto.jsonl"
          : > "$out"

          for artifact in "$GITHUB_WORKSPACE"/dist/* "$GITHUB_WORKSPACE"/sbom/*; do
            work="$(mktemp -d)"
            (
              cd "$work"
              gh attestation download "$artifact" --repo "$GITHUB_REPOSITORY"
            )
            bundles=("$work"/*.jsonl)
            if [ ! -e "${bundles[0]}" ]; then
              echo "No attestation bundle found for $artifact" >&2
              exit 1
            fi
            cat "${bundles[@]}" >> "$out"
          done

          test -s "$out"

      - name: Upload provenance artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: provenance
          path: provenance/

  sbom:
    # Separate runner. dist/ does not exist in this workspace. A
    # compromised pip-audit (or any transitive) cannot tamper with
    # the release artifacts because the artifacts are sealed in
    # GitHub storage and not present on this filesystem.
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.17"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Export runtime requirements
        # Re-export so the SBOM job is self-contained; it does not
        # consume any artifact from build/test. Same lock, same
        # resolved set, derivable independently.
        run: uv export --frozen --no-dev --no-emit-project --no-hashes --format requirements.txt --output-file .ci-audit-requirements.txt

      - name: Install pip-audit (isolated)
        # pipx-style isolation: pip-audit lives only in a uv-managed
        # virtualenv on this throwaway runner. It never sees dist/
        # because dist/ is on the ``build`` job's filesystem (sealed
        # into GitHub storage at upload time and not retrieved here).
        run: uv tool install pip-audit

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p sbom
          # ``--no-deps`` tells pip-audit not to install the locked
          # requirements again; it just reads the requirements text
          # to produce the SBOM. Every nonzero status blocks publication,
          # including a finding first disclosed after the enforcing audit ran.
          # Missing/corrupt JSON or a missing project root also fails closed.
          set +e
          uv tool run pip-audit -r .ci-audit-requirements.txt \
            --format=cyclonedx-json \
            --output "sbom/recon-tool-${VERSION}.cdx.json" \
            --no-deps
          audit_status=$?
          set -e
          if [ "$audit_status" -ne 0 ]; then
            exit "$audit_status"
          fi
          test -s "sbom/recon-tool-${VERSION}.cdx.json"
          python3 scripts/finalize_sbom.py \
            "sbom/recon-tool-${VERSION}.cdx.json" \
            --version "$VERSION"
          expected_sbom="sbom/recon-tool-${VERSION}.cdx.json"
          shopt -s nullglob dotglob
          sbom_entries=(sbom/*)
          shopt -u nullglob dotglob
          if [ "${#sbom_entries[@]}" -ne 1 ] || \
             [ "${sbom_entries[0]}" != "$expected_sbom" ] || \
             [ ! -f "$expected_sbom" ] || [ -L "$expected_sbom" ]; then
            echo "SBOM output is not the exact expected regular file: $expected_sbom" >&2
            printf 'Observed: %s\n' "${sbom_entries[@]:-none}" >&2
            exit 1
          fi

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: sbom/

  publish-pypi:
    needs: [build, attest, package-smoke, sbom]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true
          # PEP 740: generate sigstore-signed digital attestations for the wheel
          # and sdist and upload them to PyPI, so installers and auditors can
          # verify the artifacts' provenance directly from the index. Uses the
          # OIDC id-token granted to this job; complements the GitHub-native
          # build-provenance attestation produced by the ``attest`` job.
          attestations: true

  verify-pypi-parity:
    # PyPI upload is idempotent because a partial release may need recovery.
    # If PyPI already contains this version, skip-existing preserves those
    # immutable files while the current run has a newly sealed pair. Compare
    # both SHA-256 digests before the write-capable GitHub Release job can
    # create or clobber assets, preventing a split release across channels.
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Download sealed build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Require PyPI and sealed artifact parity
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 scripts/check_release_channel_parity.py \
            --version "${VERSION#v}" \
            --dist-dir dist \
            --attempts 12 \
            --delay-seconds 10

  github-release:
    needs: [build, attest, export-attestations, package-smoke, sbom, verify-pypi-parity]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          cat release_notes.md

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom
          path: sbom/

      - name: Download provenance artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: provenance
          path: provenance/

      - name: Create GitHub Release
        # Native gh CLI rather than a third-party action: it authenticates
        # through the job's GITHUB_TOKEN with no moving major-version tag to
        # regress (a softprops/action-gh-release@v3 token-handling regression
        # 401'd the v2.1.14 release after v2.1.13 succeeded on the same step).
        # A re-run may replace assets only after the existing release's tag,
        # title, publication state, and expected-only inventory pass a bounded
        # local validator. Attaches wheels, sdist, and the CycloneDX SBOM, which
        # consumers pull by stable name (recon-tool-<version>.cdx.json) for
        # downstream supply-chain audits.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          read -r remote_tag_sha remote_tag_ref extra <<< "$(
            git ls-remote --exit-code --refs origin "refs/tags/$GITHUB_REF_NAME"
          )"
          if [ -n "${extra:-}" ] || \
             [ "$remote_tag_ref" != "refs/tags/$GITHUB_REF_NAME" ] || \
             [ "$remote_tag_sha" != "$GITHUB_SHA" ]; then
            echo "Remote release tag does not resolve exactly to GITHUB_SHA; refusing publication." >&2
            exit 1
          fi
          if release_json="$(gh release view "$GITHUB_REF_NAME" \
            --json tagName,name,isDraft,isPrerelease,isImmutable,assets)"; then
            printf '%s\n' "$release_json" | \
              python3 scripts/check_release_recovery.py --version "$version"
            gh release upload "$GITHUB_REF_NAME" dist/* sbom/* provenance/* --clobber
          else
            echo "No readable existing GitHub Release was found; attempting a new fail-closed release." >&2
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "v${version}" \
              --notes-file release_notes.md \
              dist/* sbom/* provenance/*
          fi
