name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Catches unresolved action refs, bad shell in `run:` blocks, and
      # deprecated expressions before any Python job spins up. The v1.0.2
      # release regressed because `astral-sh/setup-uv@v8` isn't a real
      # floating tag; actionlint catches that class of error locally and
      # in CI.
      - name: Run actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Type check
        run: uv run pyright src/recon_tool/ tests/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        include:
          # Free-threaded 3.14 (PEP 703), Ubuntu only, as a
          # dependency-compatibility probe. recon is asyncio-based with no
          # shared mutable thread state, so the value here is catching a
          # dependency without a cp314t wheel before a user on
          # free-threaded Python hits it. Marked experimental so it does
          # not block CI: a missing cp314t wheel reports, it does not fail.
          - os: ubuntu-latest
            python-version: "3.14t"
            experimental: true
    # `.python-version` pins the local and dev toolchain to 3.14. In CI the
    # matrix has to win, so force uv to the matrix interpreter; without this
    # uv reads `.python-version` and runs every matrix job on 3.14, which
    # would silently defeat the 3.11 / 3.12 / 3.13 coverage.
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    # Non-blocking only for the experimental free-threaded probe above;
    # every other matrix job fails CI as normal.
    continue-on-error: ${{ matrix.experimental || false }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Test with coverage
        run: uv run pytest tests/ --cov=src/recon_tool --cov-branch --cov-report=term-missing --cov-fail-under=82

  audit:
    runs-on: ubuntu-latest
    env:
      # `.python-version` pins the local / dev toolchain to 3.14, and uv reads
      # it unless UV_PYTHON is set. Without this the audit's uv sync / export /
      # pip-audit would run on 3.14 instead of the interpreter setup-python
      # installs below, auditing the wrong environment. Mirror the test matrix,
      # which sets UV_PYTHON for the same reason.
      UV_PYTHON: "3.11"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Export runtime requirements
        # Hash-pinned (no --no-hashes): per-package sha256 hashes are
        # included so the audit reads a hash-pinned surface. Kept in
        # lockstep with release.yml. pip-audit handles hashed requirements.
        run: uv export --frozen --no-dev --no-emit-project --format requirements.txt --output-file .ci-audit-requirements.txt

      - name: Audit dependencies
        # PYSEC-2025-183 (CVE-2025-45768) is ignored deliberately, not
        # swept under the rug. It flags pyjwt, pulled transitively by
        # mcp[crypto] for MCP's HTTP/OAuth transport. Three reasons it
        # cannot be fixed by upgrading and is not reachable here:
        #   1. No fixed version exists. 2.12.1 is the latest release and
        #      is still flagged; the whole 0.1.1-2.12.1 range is affected.
        #   2. The maintainer disputes it (key length is the calling
        #      application's responsibility, not the library's).
        #   3. recon runs the MCP server over stdio only, with no auth
        #      transport, so pyjwt's signing/encryption path is never
        #      invoked. The vulnerable surface is unreachable.
        # Tracked in docs/security-audit-resolutions.md; drop the ignore
        # the moment a fixed pyjwt ships.
        run: uv run pip-audit -r .ci-audit-requirements.txt --ignore-vuln PYSEC-2025-183

  validate-fingerprints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Validate built-in fingerprints
        # Validates every ``*.yaml`` under ``data/fingerprints/`` and
        # pools slugs across files for a cross-file duplicate-slug check.
        # The validator accepts a directory as of v1.1 (same CLI, different
        # argument shape).
        run: uv run python scripts/validate_fingerprint.py src/recon_tool/data/fingerprints/ --quiet

      - name: Enforce fingerprint metadata coverage (v1.9.7+)
        # Per-detection presence gate: every detection in every
        # category must carry a non-empty ``description`` field.
        # Flipped from advisory (``--report-only``) to enforcing in
        # v1.9.7 once the catalog was backfilled to 100 percent.
        # The script emits the exact slug + detection-rule pairs
        # missing a description on failure so a contributor sees
        # "fix these N entries" rather than a percentage.
        run: uv run python scripts/check_metadata_coverage.py

      - name: Enforce validation artifact hygiene
        # Release and calibration artifacts may publish aggregate statistics
        # only. This catches forced-added private run paths, root per-domain
        # dumps, corpus lines, and target-domain fields in committed validation
        # artifacts before they reach main.
        run: uv run python scripts/check_validation_hygiene.py

      - name: Enforce zero EXPERIMENTAL labels (v1.9.11+)
        # v2.0 quality bar: no active EXPERIMENTAL label on any
        # operator-facing surface (CLI help, MCP tool descriptions,
        # JSON schema field descriptions, schema reference docs).
        # The script pattern-matches for label shapes (parens /
        # brackets / prefixes / Stability-column markdown) and
        # allows past-tense prose discussion in roadmap and
        # migration docs.
        run: uv run python scripts/check_no_experimental_labels.py

      - name: Enforce the file-size ratchet (no god files)
        # New modules cap at 1000 lines; the oversized modules predating the
        # guard are baselined as ceilings that may only shrink (see
        # scripts/check_file_size.py and the decomposition track in roadmap.md).
        run: uv run python scripts/check_file_size.py

  hostile-input-fuzz:
    # Dedicated gate for the adversarial / oversized / malformed parser tests and
    # the Hypothesis fuzz suites (the `hostile_input` marker). Promotes them from
    # incidental coverage under the `test` job to an authoritative, separately
    # visible gate, run at a higher Hypothesis example budget (RECON_FUZZ). The
    # same tests still run inside `test` (where they count toward coverage); this
    # job exists so a parser-bound regression is its own red check.
    runs-on: ubuntu-latest
    env:
      # .python-version pins the toolchain to 3.14; force the matrix interpreter.
      UV_PYTHON: "3.11"
      # Load the higher-budget Hypothesis profile (conftest.py) for this job.
      RECON_FUZZ: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run hostile-input fuzz gate
        run: uv run pytest tests/ -m "hostile_input and not integration"

  reproducible-build:
    # Bit-for-bit reproducible builds. With a fixed SOURCE_DATE_EPOCH, the same
    # source must produce byte-identical wheel and sdist, so a consumer can
    # rebuild the release and verify the published artifacts. release.yml pins
    # SOURCE_DATE_EPOCH to the tagged commit timestamp at build time; this gate
    # proves the property holds on every change. Builds go to RUNNER_TEMP
    # (outside the checkout) so the build output never lands in the packaged
    # source tree and falsely breaks the comparison.
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.11"
      # A fixed epoch so the two builds below share pinned file mtimes; the
      # value is arbitrary (this gate tests determinism, not the release stamp).
      SOURCE_DATE_EPOCH: "1700000000"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build twice and compare artifact hashes
        run: |
          set -euo pipefail
          uv build --out-dir "$RUNNER_TEMP/r1"
          uv build --out-dir "$RUNNER_TEMP/r2"
          fail=0
          for f in "$RUNNER_TEMP/r1"/*.whl "$RUNNER_TEMP/r1"/*.tar.gz; do
            name="$(basename "$f")"
            h1="$(sha256sum "$RUNNER_TEMP/r1/$name" | cut -d' ' -f1)"
            h2="$(sha256sum "$RUNNER_TEMP/r2/$name" | cut -d' ' -f1)"
            if [ "$h1" = "$h2" ]; then
              echo "reproducible: $name ($h1)"
            else
              echo "NOT REPRODUCIBLE: $name ($h1 != $h2)" >&2
              fail=1
            fi
          done
          exit "$fail"
