name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Catches unresolved action refs, bad shell in `run:` blocks, and
      # deprecated expressions before any Python job spins up. The v1.0.2
      # release regressed because `astral-sh/setup-uv@v8` isn't a real
      # floating tag; actionlint catches that class of error locally and
      # in CI.
      - name: Run actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check recon_tool/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Type check
        run: uv run pyright recon_tool/ tests/

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        exclude:
          - os: macos-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.10"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Test with coverage
        run: uv run pytest tests/ --cov=recon_tool --cov-report=term-missing --cov-fail-under=80

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Export runtime requirements
        run: uv export --frozen --no-dev --no-emit-project --no-hashes --format requirements.txt --output-file .ci-audit-requirements.txt

      - name: Audit dependencies
        run: uv run pip-audit -r .ci-audit-requirements.txt

  validate-fingerprints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Validate built-in fingerprints
        # Validates every ``*.yaml`` under ``data/fingerprints/`` and
        # pools slugs across files for a cross-file duplicate-slug check.
        # The validator accepts a directory as of v1.1 (same CLI, different
        # argument shape).
        run: uv run python scripts/validate_fingerprint.py recon_tool/data/fingerprints/ --quiet

      - name: Report fingerprint metadata coverage (v1.9)
        # Per-category description / reference / weight coverage report.
        # ``--report-only`` keeps this advisory while the catalog catches
        # up to the 70% target on gated categories (identity, security,
        # infrastructure). When the floor is reached, drop ``--report-only``
        # to flip the gate to enforcement.
        run: uv run python scripts/check_metadata_coverage.py --report-only
