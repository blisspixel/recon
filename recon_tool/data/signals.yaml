# signals.yaml — derived intelligence from fingerprint matches
# Version: 2026-04-11
# These fire automatically after fingerprint detection.
# No extra DNS calls — pure pattern matching on detected slugs.
#
# Design inspired by multi-vector fusion: signals are layered from simple
# (single-category detection) to composite (cross-category correlation)
# to consistency checks (contradiction detection across layers).

signals:

  # ── Layer 1: Single-category detection ────────────────────────────────
  # These fire when enough tools from one category are present.

  - name: AI Adoption
    category: AI
    confidence: high
    description: Enterprise AI tooling indicators — suggests LLM-based workflow evaluation or deployment
    requires:
      any: [openai, anthropic, mistral, perplexity, crewai-aid, langsmith, mcp-discovery]
    min_matches: 1

  - name: High GTM Maturity
    category: Go-to-Market
    confidence: high
    description: Multiple sales/marketing automation tools — suggests mature revenue operations
    requires:
      any: [6sense, outreach, salesloft, pardot, eloqua, klaviyo, hubspot, marketo, demandbase, clearbit, drift, gong, intercom, apollo, salesforce-mc, braze, iterable, customerio, unbounce]
    min_matches: 2

  - name: Enterprise Security Stack
    category: Security
    confidence: high
    description: Layered security tooling indicators — suggests endpoint, email, network, or cloud security investment
    requires:
      any: [crowdstrike, knowbe4, proofpoint, mimecast, zscaler, paloalto, wiz, sophos, trellix, barracuda, trendmicro, okta, auth0, duo, 1password, sentinelone, netskope, ping-identity, cyberark, cato, onelogin, imperva, beyond-identity]
    min_matches: 2

  - name: Modern Collaboration
    category: Productivity
    confidence: high
    description: Cloud collaboration tool indicators — suggests adoption beyond basic email/docs
    requires:
      any: [slack, notion, miro, atlassian, figma, dropbox, clickup, asana, monday, loom, canva, zoom, airtable]
    min_matches: 3

  - name: Dev & Engineering Heavy
    category: Engineering
    confidence: medium
    description: Developer tooling footprint suggests significant engineering headcount
    requires:
      any: [github, gitlab, vercel, netlify, postman, linear, figma, autodesk, databricks, snowflake, mongodb, webflow, launchdarkly, contentful, sanity, flyio, railway, fastly]
    min_matches: 2

  - name: Data & Analytics Investment
    category: Data
    confidence: medium
    description: Multiple analytics/data platforms — suggests data-driven decision making culture
    requires:
      any: [databricks, snowflake, mongodb, dynatrace, mixpanel, amplitude, heap, pendo, hotjar, segment, optimizely, walkme]
    min_matches: 2

  - name: Multi-Cloud
    category: Infrastructure
    confidence: high
    description: Infrastructure indicators across multiple cloud providers (AWS/Azure/GCP)
    requires:
      any: [aws-route53, aws-cloudfront, aws-elb, aws-s3, aws-eb, azure-dns, azure-cdn, azure-appservice, azure-fd, azure-tm, gcp-dns, gcp-app, flyio]
    min_matches: 2

  - name: Edge Layering
    category: Infrastructure
    confidence: high
    description: Multiple CDN/edge providers detected — consistent with layered edge protection or multi-CDN delivery strategy
    requires:
      any: [cloudflare, akamai, fastly, imperva]
    min_matches: 2
    # v0.9.3: when edge layering fires AND none of the listed consumer
    # SaaS fingerprints are observed, emit a hedged two-sided hardening
    # observation. The same evidence fits a deliberately hardened target,
    # a dormant / parked domain behind a proxy, or a small shop with a
    # CDN in front of very little — the observation surfaces the pattern
    # without asserting which reading applies.
    positive_when_absent:
      - slack
      - notion
      - atlassian
      - dropbox
      - canva
      - hubspot
      - salesforce
      - zoom
      - miro
      - airtable
      - intercom
      - mailchimp
      - monday
      - clickup

  - name: Observability & SRE
    category: Engineering
    confidence: high
    description: Multiple monitoring/incident tools — suggests strong engineering maturity and reliability focus
    requires:
      any: [datadog, newrelic, pagerduty, dynatrace]
    min_matches: 2

  # ── Layer 2: Cross-category composite signals ─────────────────────────
  # These correlate detections across different categories to surface
  # higher-level organizational patterns. Inspired by the research's
  # "multi-vector fusion" concept — combining independent signal layers
  # produces insights that no single layer can provide alone.

  - name: Digital Transformation
    category: Composite
    confidence: medium
    description: AI + modern collaboration + cloud infrastructure — suggests active modernization
    requires:
      any: [openai, anthropic, slack, notion, miro, figma, atlassian, vercel, netlify, databricks, snowflake]
    min_matches: 4

  - name: Sales-Led Growth
    category: Composite
    confidence: medium
    description: CRM + sales engagement + marketing automation — suggests revenue engine investment
    requires:
      any: [salesforce, salesforce-mc, hubspot, outreach, salesloft, 6sense, pardot, eloqua, marketo, gong, apollo, drift, clearbit, demandbase, intercom, braze, iterable]
    min_matches: 3

  - name: Product-Led Growth
    category: Composite
    confidence: medium
    description: Analytics + engagement + support tooling — suggests product usage-driven growth model
    requires:
      any: [mixpanel, amplitude, heap, pendo, hotjar, segment, intercom, zendesk, freshdesk, optimizely, walkme, customerio, braze]
    min_matches: 3

  - name: Enterprise IT Maturity
    category: Composite
    confidence: high
    description: Identity + endpoint + email security + MDM — suggests mature IT governance
    requires:
      any: [okta, auth0, onelogin, duo, ping-identity, crowdstrike, sophos, sentinelone, jamf, kandji, proofpoint, mimecast, zscaler, netskope, paloalto, cato, wiz, 1password, cyberark, knowbe4, imperva]
    min_matches: 4

  - name: AI Security Posture
    category: Composite
    confidence: high
    description: Enterprise AI tooling + dedicated LLM guardrails or advanced SASE — suggests mature AI governance
    requires:
      any: [openai, anthropic, mistral, perplexity, lakera, zscaler, netskope, crowdstrike]
    min_matches: 3

  # ── Layer 3: Cross-signal consistency checks ──────────────────────────
  # Inspired by the research's core thesis: "penalize contradictions
  # between layers." These detect when signals from different domains
  # are inconsistent, which often reveals interesting organizational
  # dynamics (not necessarily problems — sometimes transitions).

  - name: Security Gap — Gateway Without DMARC Enforcement
    category: Consistency
    confidence: medium
    description: Email gateway deployed but DMARC not enforcing — gateway may not be fully effective
    requires:
      any: [proofpoint, mimecast, barracuda, trendmicro, cisco-ironport, cisco-email, symantec, trellix]
    min_matches: 1
    metadata:
      - field: dmarc_policy
        operator: neq
        value: reject
      - field: dmarc_policy
        operator: neq
        value: quarantine

  - name: Heavy Outbound Stack
    category: Composite
    confidence: medium
    description: Multiple email sending services — suggests high-volume outbound email operation
    requires:
      any: [sendgrid, mailgun, postmark, sparkpost, brevo, mailchimp, aws-ses]
    min_matches: 2

  - name: File Collaboration Sprawl
    category: Consistency
    confidence: medium
    description: Multiple enterprise file-sharing platforms — possible duplication or migration in progress
    requires:
      any: [dropbox, box, egnyte]
    min_matches: 2

  - name: Zero Trust Posture
    category: Composite
    confidence: high
    description: Identity provider + SASE/ZTNA + endpoint security — Zero Trust architecture signals
    requires:
      any: [okta, auth0, onelogin, duo, ping-identity, zscaler, netskope, paloalto, cato, crowdstrike, sentinelone, 1password, cyberark, imperva]
    min_matches: 3

  - name: Startup Tool Mix
    category: Composite
    confidence: medium
    description: Modern dev + collaboration + PLG analytics — suggests early-stage or growth-stage tool profile
    requires:
      any: [vercel, netlify, github, gitlab, slack, notion, figma, linear, amplitude, mixpanel, segment, intercom]
    min_matches: 4

  - name: Dual Email Provider
    category: Consistency
    confidence: high
    description: Both Microsoft 365 and Google Workspace detected — possible migration in progress or hybrid setup
    requires:
      any: [microsoft365, google-workspace]
    min_matches: 2

  - name: Google-Native Identity
    category: Composite
    confidence: high
    description: Google Workspace as primary identity provider — email, DNS, and site verification all Google
    requires:
      any: [google-workspace, google-site, gcp-dns, google-trust, google-federated, google-managed]
    min_matches: 3

  - name: High-Security Posture (CSE)
    category: Security
    confidence: high
    description: Google Workspace Client-Side Encryption — external key management for data sovereignty
    requires:
      any: [google-cse]
    min_matches: 1

  - name: Google Cloud Investment
    category: Infrastructure
    confidence: medium
    description: Multiple Google Cloud services detected — significant GCP footprint
    requires:
      any: [gcp-dns, google-trust, google-workspace, google-cse]
    min_matches: 2

  - name: Google Workspace Full Suite
    category: Composite
    confidence: high
    description: Google Workspace module CNAMEs detected alongside MX — full suite deployment
    requires:
      any: [google-workspace-modules, google-workspace]
    min_matches: 2

  - name: Google Federated Identity
    category: Identity
    confidence: high
    description: Google Workspace with external identity provider — enterprise SSO
    requires:
      any: [google-federated]
    min_matches: 1

  - name: Google MTA-STS Enforcing
    category: Security
    confidence: high
    description: MTA-STS policy set to enforce — mandatory email transport encryption
    requires:
      any: [mta-sts-enforce]
    min_matches: 1

  # ── Layer 4: Metadata-aware signals ───────────────────────────────────
  # These combine slug detection with metadata conditions (DMARC policy,
  # SPF complexity, email security score, certificate issuance velocity)
  # for richer cross-reference intelligence.

  - name: Federated Identity with Complex Email Delegation
    category: Consistency
    confidence: medium
    description: Federated identity provider detected alongside high SPF complexity — multiple email sending services delegated through federated auth
    requires:
      any: [okta, auth0, onelogin, duo, ping-identity]
    min_matches: 1
    metadata:
      - field: spf_include_count
        operator: gte
        value: 5

  - name: Active Email Sending with Minimal Security
    category: Consistency
    confidence: high
    description: Email sending services detected with email security score at or below 1 — outbound email lacks standard authentication controls
    requires:
      any: [sendgrid, mailgun, postmark, sparkpost, brevo, mailchimp, aws-ses]
    min_matches: 1
    metadata:
      - field: email_security_score
        operator: lte
        value: 1

  - name: High Certificate Issuance Activity
    category: Infrastructure
    confidence: medium
    description: 20+ certificates issued in the last 90 days — active infrastructure provisioning or automation
    metadata:
      - field: issuance_velocity
        operator: gte
        value: 20

  # ── Layer 4 (continued): Contradiction signals ───────────────────────
  # These use the `contradicts` key to detect split-brain configurations,
  # incomplete migrations, and governance gaps. A contradiction slug's
  # presence suppresses the signal — indicating the inconsistency has
  # been resolved.

  - name: Incomplete Identity Migration
    category: Consistency
    confidence: medium
    description: External identity provider detected alongside Microsoft 365 — possible split-brain identity configuration or incomplete migration
    explain: "When an external IdP (Okta, Auth0, Ping Identity) is detected but Microsoft 365 is also present, it may indicate a partially completed identity migration. If M365 were fully decommissioned, the contradiction would resolve."
    requires:
      any: [okta, auth0, ping-identity]
    min_matches: 1
    contradicts: [microsoft365]

  - name: Dual Email Delivery Path
    category: Consistency
    confidence: medium
    description: Dual email provider indicators detected — consistent with deliberate dual-delivery architecture, mail-routing split, or migration in progress
    explain: "When both Microsoft 365 and Google Workspace email indicators are present, it may suggest a dual-provider configuration. If MTA-STS enforce is also active, it typically indicates a completed migration with unified transport policy, which suppresses this signal."
    requires:
      any: [microsoft365, google-workspace]
    min_matches: 2
    contradicts: [mta-sts-enforce]

  - name: Security Stack Without Governance
    category: Consistency
    confidence: medium
    description: Enterprise security tooling detected without strong email governance — security investment may lack email-layer controls
    explain: "When multiple enterprise security tools are present but DMARC is not set to reject, it may indicate that email governance has not kept pace with endpoint and network security investment. Strong DMARC enforcement would suppress this signal."
    requires:
      any: [crowdstrike, sentinelone, zscaler, paloalto, netskope, cato, wiz]
    min_matches: 2
    metadata:
      - field: dmarc_policy
        operator: neq
        value: reject

  # ── v0.8.0: Agentic AI & supply chain signals ────────────────────────

  - name: Agentic AI Infrastructure
    category: AI & Automation
    confidence: medium
    description: Agentic AI platform endpoints detected alongside enterprise AI tooling — suggests active autonomous agent deployment
    explain: "This signal fires when DNS records indicate the presence of agentic AI infrastructure (agent discovery endpoints, AI observability platforms, or MCP server advertisements) alongside enterprise AI platform verification. The combination suggests the organization is moving beyond basic AI adoption into autonomous agent deployment."
    requires:
      any: [crewai-aid, langsmith, mcp-discovery, openai, anthropic, mistral, perplexity, dify, n8n, autogen]
    min_matches: 2

  - name: AI Adoption Without Governance
    category: Consistency
    confidence: medium
    description: AI platform adoption detected without enterprise identity governance — possible shadow AI deployment
    explain: "AI platform verification records are detected but no enterprise identity provider (Okta, CyberArk, Beyond Identity, Ping Identity) is present. The absence of centralized identity governance alongside AI adoption may indicate shadow AI deployment or early-stage adoption without security review."
    requires:
      any: [openai, anthropic, mistral, perplexity, crewai-aid, langsmith, mcp-discovery, dify, n8n, autogen]
    min_matches: 1
    contradicts: [okta, cyberark, beyond-identity, ping-identity]

  - name: AI Platform Diversity
    category: AI
    confidence: medium
    description: Multiple distinct AI/LLM platform verifications detected — suggests multi-vendor AI strategy or evaluation phase
    explain: "Domain verification records for two or more distinct AI/LLM providers are present. This may indicate a multi-vendor AI strategy, an active evaluation phase comparing providers, or different teams adopting different platforms independently."
    requires:
      any: [openai, anthropic, mistral, perplexity]
    min_matches: 2

  - name: Software Supply Chain Maturity
    category: DevOps & Engineering
    confidence: medium
    description: Multiple software supply chain security tools detected — indicates mature DevSecOps practices
    explain: "Two or more supply chain security verification records are detected (GitHub Advanced Security, Sonatype/Maven Central, Snyk, Cosign attestation). The combination suggests the organization has invested in software composition analysis, dependency management, and repository security beyond basic CI/CD."
    requires:
      any: [github-advanced-security, sonatype, snyk, cosign-attestation, github]
    min_matches: 2

  - name: DevSecOps Investment Without Email Governance
    category: Consistency
    confidence: medium
    description: Supply chain security tooling detected with weak email security — engineering security investment may not extend to email governance
    explain: "Supply chain security tools (Snyk, Sonatype, GitHub Advanced Security) are present but email security score is below 3/5. This may indicate that engineering-focused security investment has not extended to email-layer controls."
    requires:
      any: [github-advanced-security, sonatype, snyk, cosign-attestation]
    min_matches: 1
    metadata:
      - field: email_security_score
        operator: lte
        value: 2

  - name: Edge-Native Architecture
    category: Infrastructure
    confidence: medium
    description: Multiple edge/serverless platform indicators — suggests edge-native or JAMstack deployment architecture
    explain: "Two or more edge compute or serverless deployment platforms are detected via CNAME delegations. This pattern is common in organizations using JAMstack, serverless functions, or edge-native architectures for web applications and API endpoints."
    requires:
      any: [vercel, netlify, flyio, railway, cloudflare, fastly, render]
    min_matches: 2

  - name: Enterprise Email Deliverability
    category: Email
    confidence: high
    description: SPF flattening or DMARC management service detected — indicates dedicated email operations team
    explain: "SPF flattening or DMARC management services (AutoSPF, OnDMARC, dmarcian, EasyDMARC, Valimail) are detected in the SPF include chain. These services are used by organizations that have hit the 10-lookup SPF limit or need centralized DMARC management, indicating a dedicated email operations team and mature deliverability practices."
    requires:
      any: [autospf, ondmarc, dmarcian, easydmarc, valimail]
    min_matches: 1

  - name: DMARC Governance Investment
    category: Email
    confidence: high
    description: Paid DMARC report aggregation vendor detected — indicates dedicated email governance investment
    explain: "DMARC RUA (aggregate report) addresses pointing to a paid vendor (Agari, Proofpoint EFD, dmarcian, Valimail, EasyDMARC, Red Sift/OnDMARC, URIports, DMARC Advisor, PowerDMARC, Mimecast DMARC Analyzer) indicate the organization has invested in professional DMARC monitoring and enforcement tooling. This is a strong signal of email security maturity."
    requires:
      any: [agari, proofpoint-efd, ondmarc, dmarcian, valimail, easydmarc, uriports, dmarc-advisor, powerdmarc, mimecast-dmarc-analyzer]
    min_matches: 1

  # ── v0.9.0: Primary Email Provider Detection signals ──────────────────

  - name: Email Gateway Topology
    category: Email
    confidence: high
    description: Email gateway detected in front of primary email provider — indicates layered email security architecture
    explain: "When MX records point to an email security gateway (Proofpoint, Mimecast, etc.) and a primary email provider (Microsoft 365, Google Workspace) is also detected, it indicates a layered email security architecture where inbound mail is filtered before reaching the mailbox provider."
    requires:
      any: [proofpoint, mimecast, barracuda, cisco-ironport, cisco-email, symantec, trellix, trendmicro]
    min_matches: 1
    metadata:
      - field: primary_email_provider
        operator: neq
        value: ""

  - name: Secondary Email Provider Observed
    category: Consistency
    confidence: medium
    description: A second email provider is detected via TXT/DKIM records alongside a different MX-based primary — consistent with deliberate dual-provider coexistence, migration residue, or an inactive legacy tenant
    explain: "When a provider is detected via TXT or DKIM verification records but a different provider handles MX-based email delivery, the secondary provider may be actively used (dual coexistence), may be residual DNS from a past migration, or may be an inactive legacy tenant. The signal is neutral — it surfaces the observation without asserting which case applies. Users can distinguish active dual-use from residue by checking whether the secondary provider receives mail (DMARC reports, Authentication-Results headers) or is only present in verification records."
    requires:
      any: [microsoft365, google-workspace]
    min_matches: 1
    metadata:
      - field: primary_email_provider
        operator: neq
        value: ""
    exclude_matches_in_primary: true
