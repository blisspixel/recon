# CRM, sales, marketing, and advertising fingerprints. Marketing automation, sales intelligence, ad platforms.
#
# Loaded by recon_tool.fingerprints.load_fingerprints.
# Custom overrides: ~/.recon/fingerprints.yaml (additive only).

fingerprints:
- name: Salesforce
  slug: salesforce
  category: CRM & Marketing
  confidence: high
  parent_vendor: Salesforce
  detections:
  - type: txt
    pattern: ^salesforce-domain-verification=
    reference: https://help.salesforce.com/s/articleView?id=sf.domain_name_overview.htm
    description: >-
      Salesforce domain-verification TXT. Indicates the domain
      is administratively bound to a Salesforce org, typically
      for SSO federation or Experience Cloud custom-domain
      setup. Does not by itself identify which Salesforce
      product (Sales Cloud, Service Cloud, Experience Cloud,
      Marketing Cloud) is in use.
  - type: txt
    pattern: ^00D[A-Za-z0-9]{12,15}=
    reference: https://help.salesforce.com/s/articleView?id=sf.domain_name_overview.htm
    description: >-
      Salesforce Organization ID (the `00D` prefix is the
      fixed identifier for Org records in Salesforce's
      object-prefix scheme). Indicates the domain has been
      verified to a specific Salesforce org. The OrgID itself
      is a unique tenant identifier; presence proves an
      administrative CRM relationship between the domain owner
      and a Salesforce org.
  - type: spf
    pattern: salesforce.com
    reference: https://help.salesforce.com/s/articleView?id=sf.domain_name_overview.htm
    description: >-
      SPF include matching salesforce.com. Authorizes Salesforce
      to send mail on behalf of the domain, typically for
      Salesforce-initiated emails (case responses, Marketing
      Cloud sends through the platform, automated workflows).
  - type: spf
    pattern: _spf.salesforce.com
    reference: https://help.salesforce.com/s/articleView?id=sf.domain_name_overview.htm
    description: >-
      Alternative Salesforce SPF include (`_spf.salesforce.com`).
      Same outbound-authorization semantics as the bare
      `salesforce.com` include; some tenant configurations use
      the underscored form.
- name: Salesforce Marketing Cloud
  slug: salesforce-mc
  category: CRM & Marketing
  confidence: high
  product_family: Salesforce Marketing Cloud
  parent_vendor: Salesforce
  detections:
  - type: cname
    pattern: sfmc-marketing.com
    reference: https://help.salesforce.com/s/articleView?id=sf.mc_es_set_up_custom_domain.htm
    description: >-
      CNAME pointing into sfmc-marketing.com, Salesforce
      Marketing Cloud's link-tracking and click-attribution
      endpoint. Indicates the domain has at least one tracked
      subdomain for SFMC sends.
  - type: cname
    pattern: sfmc-content.com
    reference: https://help.salesforce.com/s/articleView?id=sf.mc_es_set_up_custom_domain.htm
    description: >-
      CNAME pointing into sfmc-content.com, Salesforce
      Marketing Cloud's content and image hosting endpoint.
      Indicates the domain serves SFMC-hosted images and
      attachments through a branded subdomain.
  - type: cname
    pattern: exacttarget.com
    reference: https://help.salesforce.com/s/articleView?id=sf.mc_es_set_up_custom_domain.htm
    description: >-
      CNAME pointing into exacttarget.com, the legacy domain
      for Salesforce Marketing Cloud (originally ExactTarget,
      acquired by Salesforce in 2013). Functionally
      equivalent to the `sfmc-*.com` patterns; some tenants
      still use the legacy CNAME.
- name: HubSpot
  slug: hubspot
  category: CRM & Marketing
  confidence: high
  detections:
  - type: txt
    pattern: ^hubspot-domain-verification=
    reference: https://knowledge.hubspot.com/website-pages/connect-a-domain-to-hubspot
    description: >-
      HubSpot domain-verification TXT. Indicates the domain is
      registered with a HubSpot account, typically for hosting
      HubSpot-served landing pages, blog posts, or marketing
      sends under a branded subdomain. Does not identify
      which HubSpot Hubs (Marketing, Sales, Service, CMS) are
      licensed.
  - type: txt
    pattern: ^hubspot-developer-verification=
    reference: https://knowledge.hubspot.com/website-pages/connect-a-domain-to-hubspot
    description: >-
      HubSpot developer-portal or sandbox-account domain
      verification TXT. Used for verifying domains against
      HubSpot's developer test accounts rather than production.
      Presence suggests a development team is using HubSpot
      tooling; less indicative of production HubSpot use.
  - type: spf
    pattern: hubspotemail.net
    reference: https://knowledge.hubspot.com/website-pages/connect-a-domain-to-hubspot
    description: >-
      SPF include matching hubspotemail.net. Authorizes
      HubSpot to send marketing and transactional emails on
      behalf of the domain. Typically present alongside the
      HubSpot domain-verification TXT.
  - type: cname
    pattern: hubspot.net
    reference: https://knowledge.hubspot.com/website-pages/connect-a-domain-to-hubspot
    description: >-
      CNAME pointing into hubspot.net, HubSpot's CDN and
      hosted-page endpoint. Indicates the domain serves at
      least one page (landing page, blog, or knowledge base)
      from HubSpot infrastructure under a branded subdomain.
