# Vertical-specific fingerprints. Education, nonprofit, payments, and other verticals too small for their own file.
#
# Loaded by recon_tool.fingerprints.load_fingerprints.
# Custom overrides: ~/.recon/fingerprints.yaml (additive only).

fingerprints:
- name: Stripe
  slug: stripe
  category: Payments & Finance
  confidence: high
  parent_vendor: Stripe
  detections:
  - type: txt
    pattern: ^stripe-verification=
- name: DocuSign
  slug: docusign
  category: Payments & Finance
  confidence: high
  parent_vendor: DocuSign
  detections:
  - type: txt
    pattern: ^docusign=
- name: Google (site verified)
  slug: google-site
  category: Misc
  confidence: low
  parent_vendor: Google
  detections:
  - type: txt
    pattern: ^google-site-verification=
    description: Google Search Console / site ownership — NOT Google Workspace email
- name: Canvas LMS (Instructure)
  slug: canvas-lms
  category: Education
  confidence: high
  detections:
  - type: cname
    pattern: instructure.com
    description: Canvas LMS by Instructure — dominant higher-ed learning management system
  - type: txt
    pattern: ^canvas-site-verification=
    description: Canvas LMS domain verification token
- name: Blackboard Learn
  slug: blackboard
  category: Education
  confidence: high
  detections:
  - type: cname
    pattern: blackboard.com
    description: Blackboard Learn LMS
  - type: cname
    pattern: bbcollab.com
    description: Blackboard Collaborate (live classrooms)
- name: Moodle
  slug: moodle
  category: Education
  confidence: high
  detections:
  - type: cname
    pattern: moodle.com
    description: Moodle LMS hosting
  - type: cname
    pattern: moodlecloud.com
    description: MoodleCloud hosted LMS
- name: Ellucian Banner
  slug: ellucian-banner
  category: Education
  confidence: high
  detections:
  - type: cname
    pattern: ellucian.com
    description: Ellucian Banner Student Information System
  - type: cname
    pattern: ellucianworkflow.com
    description: Ellucian Workflow
- name: Handshake (careers)
  slug: handshake
  category: Education
  confidence: high
  detections:
  - type: cname
    pattern: joinhandshake.com
    description: Handshake student career services platform
- name: Top Hat
  slug: tophat
  category: Education
  confidence: medium
  detections:
  - type: cname
    pattern: tophat.com
    description: Top Hat student engagement / course engagement platform
- name: Salesforce NPSP (Nonprofit)
  slug: salesforce-npsp
  category: Nonprofit
  confidence: high
  detections:
  - type: txt
    pattern: ^salesforce-npsp-verification=
    description: Salesforce Nonprofit Success Pack domain verification
  - type: cname
    pattern: salesforce-communities.com
    description: Salesforce Communities / Experience Cloud (commonly used by nonprofits)
- name: Blackbaud
  slug: blackbaud
  category: Nonprofit
  confidence: high
  detections:
  - type: cname
    pattern: blackbaud.com
    description: Blackbaud CRM / Raiser's Edge / fundraising tools
  - type: cname
    pattern: blackbaudhosting.com
    description: Blackbaud hosted services
- name: Classy (GoFundMe)
  slug: classy
  category: Nonprofit
  confidence: high
  detections:
  - type: cname
    pattern: classy.org
    description: Classy nonprofit fundraising platform (owned by GoFundMe)
