    description: >-
      Notion domain-verification TXT. Indicates the domain is
      registered with a Notion workspace, typically for SSO
      federation or hosting Notion-published sites under a
      branded subdomain.
  - type: txt
    pattern: ^notion-verification-code
    reference: https://www.notion.so/help
    description: >-
      Alternative Notion verification TXT format
      (`notion-verification-code` prefix). Same administrative-
      binding semantics; Notion has used both forms over time.
