# Productivity and collaboration fingerprints. Suite tooling, helpdesk, HR platforms, knowledge management.
#
# Loaded by recon_tool.fingerprints.load_fingerprints.
# Custom overrides: ~/.recon/fingerprints.yaml (additive only).

fingerprints:
- name: Atlassian (Jira/Confluence)
  slug: atlassian
  category: Productivity & Collaboration
  confidence: high
  detections:
  - type: txt
    pattern: ^atlassian-domain-verification=
    description: Atlassian Cloud organization domain verification (SSO, Guard)
- name: Slack
  slug: slack
  category: Productivity & Collaboration
  confidence: high
  detections:
  - type: txt
    pattern: ^slack-domain-verification=
    description: Slack workspace domain claim (Enterprise Grid)
    reference: https://slack.com/help/articles/5513043606547
  - type: subdomain_txt
    pattern: _slack-challenge:.
    description: Slack Enterprise Grid verification — proves Enterprise tier (not Pro/Business)
