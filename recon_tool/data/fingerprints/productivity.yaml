# Productivity and collaboration fingerprints. Suite tooling, helpdesk, HR platforms, knowledge management.
#
# Loaded by recon_tool.fingerprints.load_fingerprints.
# Custom overrides: ~/.recon/fingerprints.yaml (additive only).

fingerprints:
- name: Atlassian (Jira/Confluence)
  slug: atlassian
  category: Productivity & Collaboration
  confidence: high
  parent_vendor: Atlassian
  detections:
  - type: txt
    pattern: ^atlassian-domain-verification=
    reference: https://support.atlassian.com/atlassian-account/
    description: >-
      Atlassian Cloud organization domain-verification TXT.
      Indicates the domain is administratively bound to an
      Atlassian Cloud org (Jira, Confluence, Bitbucket, Atlassian
      Guard, and so on; products share the org-level
      verification). Common in setups with SSO federation and
      Atlassian Guard (formerly Atlassian Access).
- name: Slack
  slug: slack
  category: Productivity & Collaboration
  confidence: high
  parent_vendor: Salesforce
  detections:
  - type: txt
    pattern: ^slack-domain-verification=
    reference: https://slack.com/help
    description: >-
      Slack workspace domain-verification TXT. Indicates the
      domain is claimed by a Slack workspace, typically as part
      of Enterprise Grid setup. Slack is a Salesforce product
      after the 2021 acquisition.
    reference: https://slack.com/help/articles/5513043606547
  - type: subdomain_txt
    pattern: _slack-challenge:.
    reference: https://slack.com/help
    description: >-
      Slack Enterprise Grid subdomain-challenge TXT found at
      `_slack-challenge.<domain>`. Indicates the domain is
      verified to a Slack Enterprise Grid org (Slack's top
      tier), not a Pro or Business+ workspace. Useful for
      distinguishing Enterprise customers from standard
      tenants.
