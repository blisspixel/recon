  confidence: high
  detections:
  - type: txt
    pattern: ^autogen-domain-verification=
    description: Microsoft AutoGen agentic framework domain verification
- name: CrewAI Agent Interface Discovery (AID)
  slug: crewai-aid
  category: AI & Generative
  confidence: high
  detections:
  - type: subdomain_txt
    pattern: v=aid1;.*(?:src=|uri=)
    description: CrewAI AID TXT record at _agent.<domain> advertising autonomous agent MCP endpoints
    reference: https://github.com/crewAIInc/crewAI/discussions/3164
- name: LangSmith Enterprise
  slug: langsmith
  category: AI & Generative
  confidence: high
  detections:
  - type: cname
    pattern: \.p\.api\.smith\.langchain\.com$
    description: CNAME delegation to LangSmith managed GCP infrastructure for AI observability
    reference: https://docs.langchain.com/langsmith/cloud
- name: MCP DNS Discovery
  slug: mcp-discovery
  category: AI & Generative
  confidence: medium
  detections:
  - type: subdomain_txt
    pattern: ^v=mcp1;
    description: MCP DNS-native discovery record at _mcp.<domain> advertising Model Context Protocol endpoints
    reference: https://github.com/modelcontextprotocol/modelcontextprotocol/discussions/2368
