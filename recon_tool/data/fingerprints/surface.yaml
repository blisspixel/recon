# ──────────────────────────────────────────────────────────────────────────
# v1.9.3.9: cloud-vendor coverage gap fill.
#
# Each fingerprint below was added based on the vendor's own published
# documentation of customer-facing custom-domain CNAME targets — not from
# corpus observation. The ``reference`` field cites the vendor doc URL.
# This methodology (vendor-doc-sourced) complements the existing
# corpus-observed methodology (where catalog growth ships fingerprints
# for unclassified CNAME patterns surfaced by a private-corpus scan):
#
#   * Corpus-observed fingerprints catch what we see. The bias: our
#     private corpus skews enterprise M365 + AWS + Cloudflare. Heavy
#     GCP / Azure non-O365 / Oracle / Alibaba / SaaS-PaaS / SSE-SASE
#     coverage gets under-represented.
#
#   * Vendor-doc-sourced fingerprints catch what we *would* see if a
#     customer of that vendor entered our scope. Closes the coverage
#     blindspot before a customer happens to be in the corpus.
#
# Future catalog growth should use BOTH methodologies. A new
# ``cname_target`` rule that does not cite a vendor-doc URL should be
# corpus-backed; a rule that cites a vendor doc may ship without
# corpus observation if the vendor doc documents the pattern as
# stable.
# ──────────────────────────────────────────────────────────────────────────

