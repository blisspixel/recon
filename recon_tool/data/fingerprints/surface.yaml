# CNAME-target classifications for the surface-attribution pipeline.
#
# Rules in this file fire when any related domain's CNAME chain (the targets
# discovered via crt.sh / CertSpotter and the common-subdomain probe) contains
# the substring pattern. This is a different code path from `cname` rules,
# which match on CNAMEs returned for hardcoded apex queries (autodiscover.,
# selector1._domainkey., etc.).
#
# Display names match the existing apex fingerprints exactly — the merger
# dedupes services by name, so listing "Shopify" both from the apex SPF rule
# and from a subdomain CNAME-target rule produces a single "Shopify" entry
# in the panel rather than two near-duplicates.
#
# Tier semantics:
#   application    — a SaaS or product layer. Wins as the primary attribution
#                    when a chain produces both an application and an
#                    infrastructure match. Examples: Shopify, Auth0, Zendesk.
#   infrastructure — a CDN, load balancer, or edge layer. Falls back when no
#                    application tier matched the chain. Examples: Fastly,
#                    CloudFront, Cloudflare, Akamai.
#
# Patterns are substrings, case-insensitive. Be specific — a generic
# `amazonaws.com` would mis-attribute every AWS-hosted subdomain. Prefer the
# zone- or service-specific suffix (`elb.amazonaws.com`,
# `awsglobalaccelerator.com`).

fingerprints:

# ── Application tier ─────────────────────────────────────────────────────

- name: Shopify
  slug: shopify
  category: Infrastructure
  confidence: high
  detections:
  - type: cname_target
    pattern: myshopify.com
    tier: application
    description: Subdomain CNAMEs to a Shopify storefront (shops.myshopify.com)
  - type: cname_target
    pattern: shopifycdn.com
    tier: application
    description: Shopify CDN endpoint

