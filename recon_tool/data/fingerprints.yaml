# saas_fingerprints.yaml
# Version: 2026-04-11
# Curated from real DNS scans, official docs, and enterprise recon patterns.
# Add new fingerprints here — no code changes needed.
# Custom overrides: ~/.recon/fingerprints.yaml (additive only — cannot disable built-ins)
#
# To contribute a new fingerprint:
#   - name: Service Name
#     slug: service-slug          # lowercase, unique, used by signals.yaml
#     category: Category Name     # use an existing category if possible
#     confidence: high             # high, medium, or low
#     detections:
#       - type: txt                # txt, spf, mx, ns, cname, subdomain_txt, caa, srv
#         pattern: "^service-domain-verification="
#         description: What this record means

